name: bdc-feature-development
description: |
  Use when: Executing a BDC feature-class Work Order from an approved spec.
  Input: WO_ID in the environment or user message, plus repo context from Overlord.
  Does: Reads the BDC WO spec, plans surgical implementation, verifies, commits, pushes, opens PRs, and builds a Captain CI manifest.
  NOT for: Doctrine-only updates, cleanup sweeps, infrastructure deploys, or bug-fix WOs with their own workflow.

policyFile: harness/policies/agent-behavior.md
model: sonnet

nodes:
  # Pre-flight: fail closed if container lacks GITHUB auth (WO-169, 2026-05-16).
  # Anchor: 2026-05-16 engine sortie. Container-side `git push` silently failed
  # (no GITHUB_TOKEN); downstream `|| echo` swallow patterns let the workflow
  # report success while no commits reached origin. Catch the auth gap up front.
  - id: preflight-github-auth
    persona: major-build
    load_bearing: true
    bash: |
      set -euo pipefail
      if ! git push --dry-run origin "HEAD:refs/heads/preflight-auth-probe-$(date +%s)" 2>&1; then
        echo "ERROR: GITHUB auth check failed -- container cannot push to origin." >&2
        echo "Likely cause: GITHUB_TOKEN missing in executor env, or token lacks repo scope." >&2
        exit 1
      fi
      echo "preflight-github-auth PASS"

  - id: read-spec
    persona: xo
    depends_on: [preflight-github-auth]
    bash: |
      set -euo pipefail
      WO_ID="${WO_ID:-}"
      if [ -z "$WO_ID" ]; then
        WO_ID=$(printf '%s\n' "$USER_MESSAGE" | grep -Eo 'WO-[A-Z0-9-]+' | head -n 1 || true)
      fi
      if [ -z "$WO_ID" ]; then
        echo "WO_ID missing. Provide WO_ID in environment or user message." >&2
        exit 1
      fi
      # Specs live in bdc-xo (NOT the target codebase). Cross-repo fetch via gh api.
      # Per YAML Recipe v1 Section 4 / Rule 5: try docs/work-orders/ then docs/superpowers/specs/ glob.
      SPEC_PATH="docs/work-orders/${WO_ID}.md"
      SPEC_CONTENT=$(gh api "repos/bluedevilcollectibles/bdc-xo/contents/${SPEC_PATH}?ref=main" --template '{{.content}}' 2>/dev/null | tr -d '\n' | base64 -d 2>/dev/null || true)
      if [ -z "$SPEC_CONTENT" ]; then
        # Fallback 1: docs/superpowers/specs/${WO_ID}.md direct
        SPEC_PATH="docs/superpowers/specs/${WO_ID}.md"
        SPEC_CONTENT=$(gh api "repos/bluedevilcollectibles/bdc-xo/contents/${SPEC_PATH}?ref=main" --template '{{.content}}' 2>/dev/null | tr -d '\n' | base64 -d 2>/dev/null || true)
      fi
      if [ -z "$SPEC_CONTENT" ]; then
        # Fallback 2: date-prefix glob in docs/superpowers/specs/
        MATCH=$(gh api "repos/bluedevilcollectibles/bdc-xo/contents/docs/superpowers/specs?ref=main" --template '{{range .}}{{.path}}{{"\n"}}{{end}}' 2>/dev/null | grep "${WO_ID}.md$" | head -n 1)
        if [ -n "$MATCH" ]; then
          SPEC_PATH="$MATCH"
          SPEC_CONTENT=$(gh api "repos/bluedevilcollectibles/bdc-xo/contents/${SPEC_PATH}?ref=main" --template '{{.content}}' | tr -d '\n' | base64 -d || true)
        fi
      fi
      if [ -z "$SPEC_CONTENT" ]; then
        # Fallback 4: GitHub issue body (WO-HARNESS-READ-SPEC-ISSUE-BODY-FALLBACK-01)
        ISSUE_NUM=$(printf '%s\n' "${USER_MESSAGE:-}" | grep -Eo 'issue=[0-9]+' | head -n 1 | cut -d= -f2 || true)
        if [ -z "$ISSUE_NUM" ]; then
          ISSUE_NUM=$(gh issue list --repo bluedevilcollectibles/bdc-xo \
            --search "${WO_ID} in:title" --json number,title \
            --jq '.[0].number' 2>/dev/null || true)
        fi
        if [ -n "$ISSUE_NUM" ] && [ "$ISSUE_NUM" != "null" ]; then
          SPEC_CONTENT=$(gh issue view "$ISSUE_NUM" --repo bluedevilcollectibles/bdc-xo \
            --json body --jq .body 2>/dev/null || true)
          [ -n "$SPEC_CONTENT" ] && SPEC_PATH="issues/${ISSUE_NUM}"
        fi
      fi
      if [ -z "$SPEC_CONTENT" ]; then echo "Spec not found (tried docs/work-orders/, docs/superpowers/specs/ direct, date-prefix glob, and GitHub issue search)" >&2; exit 1; fi
      printf 'WO_ID=%s\nSPEC_PATH=bdc-xo:%s\n\n' "$WO_ID" "$SPEC_PATH"
      printf '%s\n' "$SPEC_CONTENT"

  - id: plan
    persona: war-council-architect
    depends_on: [read-spec]
    agent: war-council-architect
    task_class: medium_work
    prompt: |
      Read the BDC Work Order spec below and produce a concise implementation plan.

      ## Required Output
      Return structured Markdown with these headings:
      - WO ID
      - Files to modify
      - Files to create
      - Files explicitly out of scope
      - Verification commands
      - Commit message
      - Push policy
      - Staging gate required

      ## BDC Push Policy
      Hardcoded Rule 20 staging-gate repos:
      - bluedevilcollectibles/lspro-react
      - bluedevilcollectibles/shopops-storefront
      - bluedevilcollectibles/shopops

      For those repos, use a feature branch plus PR and require the staging gate.
      For bdc-xo non-doctrine code and any other repo, use feature branch plus PR without staging gate.
      Doc-only and doctrine-only WOs are out of scope for this workflow.

      ## Spec
      $read-spec.output

  # plan-review: in-run self-repair loop (doctrine: self-repair-review-loops +
  # in-run-review-loops-feature-dev, 2026-05-30). war-council-architect re-reviews and
  # REVISES its own plan until clean or 2 repair attempts, then escalates. This is a
  # SELF-CONTAINED loop (the executor has no cross-node loop-back); the initial plan
  # comes from `plan`, the review-and-revise happens here. Output is the final approved
  # plan that `implement` consumes. NOT a human gate -- humans are reached only via the
  # async escalation payload, and only at the irreversible-action boundary downstream.
  - id: plan-review
    persona: war-council-architect
    agent: war-council-architect
    depends_on: [plan]
    task_class: medium_work
    loop:
      fresh_context: true
      # Success-only sentinel. The war-council-architect persona is READ-ONLY
      # (tools: [Read,Grep,Glob,WebFetch] -- no Write), so this loop is STDOUT-ONLY:
      # no until_bash, no findings file. Completion = the architect emits the
      # PLAN_REVIEW_APPROVED token, which it is instructed to emit ONLY when the plan
      # truly passes (never on a failing/escalation iteration). On the final iteration
      # without approval, the loop exhausts and the run fails closed (escalation in output).
      until: PLAN_REVIEW_APPROVED
      max_iterations: 3
      prompt: |
        You are the War Council Architect doing an adversarial self-review of the
        implementation plan, then REVISING it in place. Iteration-driven self-repair:
        one initial pass + up to 2 repair attempts. You are READ-ONLY (no file writes,
        no shell) -- everything you produce goes to STDOUT.

        ## Prior iteration (read FIRST)
        Your previous iteration's full output (empty on the first pass):
        $LOOP_PREV_OUTPUT
        If it contains findings (PLAN_REVIEW=needs_revision), you MUST resolve every one
        in the revised plan this iteration. If a finding repeats and you cannot resolve
        it, escalate (below) instead of looping again.

        ## Inputs
        Original plan: $plan.output
        Spec: $read-spec.output

        ## Attack the plan on these dimensions
        1. Scope creep -- any file not justified by the spec.
        2. Missing files -- in-scope work the plan omits.
        3. Unsafe assumptions -- "assume X exists" without verification.
        4. Rule 20 staging gate -- if target repo is lspro-react / shopops-storefront /
           shopops, plan MUST require --base staging. If not those, must NOT.
        5. Out-of-scope list present and correct.

        ## Self-repair (the point -- do not just report)
        If you find issues AND they are plan-level fixable, REVISE the plan to resolve
        them and emit the corrected plan in full. Do not halt for a human on anything
        you can fix here.

        ## Required STDOUT format (this is the only handoff -- emit EXACTLY this shape)
        The blocks are fenced so downstream nodes consume ONLY the approved plan, never
        your critique. Emit, in this order:

          PLAN_REVIEW_PASS=<true|false>
          PLAN_REVIEW_RISK=<LOW|MEDIUM|HIGH>

          === APPROVED_PLAN_BEGIN ===
          <the FINAL revised plan in full -- this and ONLY this is what implement uses>
          === APPROVED_PLAN_END ===

          === PLAN_REVIEW_FINDINGS_BEGIN ===
          <your findings / what you changed and why, or "(none)">
          === PLAN_REVIEW_FINDINGS_END ===

        The APPROVED_PLAN block must always contain a complete, usable plan (even on a
        passing first iteration where you changed nothing -- echo the original plan there).
        Keep ALL critique inside the FINDINGS block; never let critique leak into the
        APPROVED_PLAN block.

        ## Completion sentinel (success ONLY)
        If and ONLY if PLAN_REVIEW_PASS=true (scope contained, no in-scope file missing,
        Rule 20 gate correct), emit on its OWN LINE as the LAST line:
          PLAN_REVIEW_APPROVED
        On a failing iteration emit instead (never the approved token):
          PLAN_REVIEW_NEEDS_REVISION
        Emitting PLAN_REVIEW_APPROVED is the gate that lets the run proceed to implement,
        so emit it ONLY when PLAN_REVIEW_PASS=true.

        ## Escalation (emit instead of approving; do NOT emit the approved sentinel)
        If the spec is ambiguous/contradictory, the fix needs a new side-effect class or
        ungranted scope, or the same finding survived a prior attempt and you cannot
        resolve it -- set PLAN_REVIEW_PASS=false, emit PLAN_REVIEW_NEEDS_REVISION, and put
        this block inside the FINDINGS block:
          ESCALATION_REQUIRED=true
          ESCALATION_REASON=<ambiguous-spec|new-side-effect-class|loop-exhausted>
          WO_ID=<id>
          NODE=plan-review
          ATTEMPTS=<n>/3
          WHAT_FAILED=<one paragraph>
          WHAT_WAS_TRIED=<3-6 bullets>
          LAST_REVIEW_FINDINGS=<exact bullets>
          SINGLE_DECISION_NEEDED=<one sentence John can answer>
          SAFE_STATE=<nothing committed/pushed; plan stage only>

  - id: implement
    persona: major-build
    depends_on: [plan-review]
    agent: major-build
    task_class: medium_work
    loop:
      prompt: |
        Implement the approved plan for this BDC feature Work Order.

        ## Spec
        $read-spec.output

        ## Plan (approved by plan-review)
        Use ONLY the text between the === APPROVED_PLAN_BEGIN === and
        === APPROVED_PLAN_END === markers below as the plan. IGNORE everything outside
        those markers (verdict headers, the PLAN_REVIEW_FINDINGS block, sentinels) --
        that is reviewer metadata, not the plan.
        $plan-review.output

        ## Execution Rules
        - Modify only the files identified as in scope by the spec.
        - Prefer existing repo patterns and helpers.
        - Do not reformat unrelated code.
        - Do not deploy.
        - Do not bypass approval gates.
        - Stop and report a blocker if the spec is ambiguous or a needed source of truth is missing.

        ## Commit-and-push BEFORE exit (Patch 2, 2026-05-16)
        When your implementation is complete, BEFORE emitting the sentinel below, run:

        ```bash
        BRANCH=$(git rev-parse --abbrev-ref HEAD)
        # Re-derive WO_ID locally (don't interpolate spec output - quote-safety)
        WO_ID="${WO_ID:-$(printf '%s\n' "${USER_MESSAGE:-}" | grep -Eo 'WO-[A-Z0-9-]+' | head -n 1 || true)}"
        git add -A
        git diff --cached --quiet || git commit -m "feat: implement ${WO_ID}

        Implementation per WO spec. Self-verified within implement loop.
        Workflow-time verify-* removed 2026-05-16 (Patch 1); PR-time gates handle validation.

        Co-Authored-By: Claude (Cauldron major-build) <noreply@anthropic.com>"
        git push -u origin "$BRANCH" 2>&1 || echo "WARN: push failed - operator must recover from worktree"
        ```

        Why: workflow-time verify-* gates were removed (Patch 1). Even with them gone, if any
        downstream node fails (sentinel mismatch, war-council-validator timeout, etc.), the
        traditional commit-and-push node may be skipped. Committing + pushing HERE makes your
        work durable regardless of what happens after this iteration ends.

        Worst case: the downstream commit-and-push node runs and is a no-op because HEAD is
        already pushed. Best case: your work is on origin even if everything else fails.

        ## Completion Criteria + Sentinel Emission (Patch 3, 2026-05-16)
        Output ALL THREE of the following standard BDC sentinels, each on its own line at the
        very end of your output, when all spec stop conditions are met OR a true blocker is
        identified with evidence:

        COMPLETE
        BUILD_COMPLETE
        <promise>COMPLETE</promise>

        Reason: BDC YAMLs have used different sentinel strings over time. Emitting all three
        guarantees the loop's `until:` matcher finds one. If you found a true blocker, end
        with a single line `BLOCKED: <one-sentence reason>` instead.
      until: COMPLETE
      max_iterations: 5
      fresh_context: true

  # NOTE - verify-build / verify-types / verify-tests removed 2026-05-16 (Patch 1 of Cauldron friction sweep).
  # Rationale: those nodes consistently killed valid implementation work on pre-existing harness rot
  # (15+ @archon/paths failures, npm-not-found before bun sweep, scope-too-wide tsc) rather than catching
  # real WO-introduced bugs. The implement loop now self-verifies (Rule 19 of YAML Recipe v1) and commits
  # its own work before exit (Patch 2). Downstream PR-time gates catch real bugs at human-readable layer:
  #   - codex-review (adversarial schema/code)
  #   - claude-review (doctrine/architecture)
  #   - Gitleaks (secret scan)
  #   - e2e-smoke (CI integration test)
  #   - Captain CI manifest contract check
  # Workflow-time verify-* was redundant with PR-time review and high-cost-low-value. See also: WO-149
  # (verify-scope-to-changed-files) and WO-146 (npm->bun sweep) for the deeper structural fixes.

  # Cauldron resilience: commit + push WIP branch after implement loop exits.
  # Best-effort only -- failure logged and silently tolerated (NOT load_bearing).
  # If container restarts after this node but before backstop, work survives on origin.
  # If nothing changed since last checkpoint, exits 0 silently.
  # Anchor: 2026-05-24 run 07415e9f lost local commit when container restarted before backstop.
  # WO-HARNESS-IMPLEMENT-CHECKPOINT-PUSH-01
  - id: checkpoint-push
    persona: overseer
    depends_on: [implement]
    bash: |
      set -uo pipefail

      WO_ID="${WO_ID:-unknown}"
      WIP_BRANCH="wip/${WO_ID}-$(date +%Y%m%d%H%M%S)"

      git add -A 2>/dev/null || true

      if git diff --cached --quiet 2>/dev/null; then
        echo "checkpoint-push: nothing staged -- no commit needed"
        exit 0
      fi

      git commit -m "wip: checkpoint after implement loop -- ${WO_ID}

      Cauldron resilience checkpoint. Not the final commit.
      Will be superseded by backstop commit-and-push node.

      Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>" \
        2>/dev/null || { echo "WARN: checkpoint commit failed -- continuing" >&2; exit 0; }

      if git push -u origin "HEAD:${WIP_BRANCH}" 2>/dev/null; then
        echo "checkpoint-push: WIP branch pushed -- ${WIP_BRANCH}"
        echo "CHECKPOINT_BRANCH=${WIP_BRANCH}"
        echo "CHECKPOINT_SHA=$(git rev-parse HEAD)"
      else
        echo "WARN: checkpoint push failed -- work is local only; backstop will retry" >&2
      fi
      exit 0

  - id: war-council-validator
    persona: captain-ci-validator
    depends_on: [checkpoint-push]
    task_class: medium_work
    prompt: |
      Invoke or emulate the war-council-validator review for this Work Order.

      ## Validator Agent
      war-council-validator

      ## Inputs
      Spec:
      $read-spec.output

      Plan (approved -- reviewed + revised by plan-review):
      $plan-review.output

      Implementation output:
      $implement.output

      Git diff:
      Run `git diff --stat` and `git diff --check`, then inspect the relevant changed files.

      ## Required Output
      Return either:
      - satisfied: with evidence that the spec deliverables and stop conditions were met
      - needs_revision: with exact file/path/behavior findings

  # diff-review chain (doctrine: self-repair-review-loops + in-run-review-loops-feature-dev,
  # 2026-05-30). Runs AFTER validation, BEFORE the irreversible commit-and-push. Three nodes,
  # executor-honest: Codex is read-only and CANNOT write files; until_bash CANNOT prove a
  # semantic Codex objection was fixed. So: codex reviews (stdout only) -> major-build repairs
  # (reads codex stdout in-prompt, until_bash checks MECHANICAL invariants only) -> codex
  # RE-REVIEWS for real and decides. Cross-model: Codex attacks Claude-authored code.
  # capture-diff: the Codex reviewer persona is read-only [Read,Grep,Glob] with NO Bash,
  # so it cannot run `git diff` itself (F5 fix). This bash node captures the full feature
  # diff (merge-base..HEAD plus any unstaged working-tree changes) to an artifact the
  # Codex review prompts read. Emits provenance so the reviewer knows exactly what it saw.
  - id: capture-diff
    depends_on: [war-council-validator]
    bash: |
      set -uo pipefail
      mkdir -p "$ARTIFACTS_DIR"
      OUT="$ARTIFACTS_DIR/diff.patch"
      BASE_REF="origin/${BASE_BRANCH:-main}"
      # NF2: when there is no merge-base and no HEAD~1 (single-commit / no-base repo),
      # fall back to the empty-tree hash, NOT HEAD. HEAD..HEAD is an EMPTY diff (reviewer
      # sees nothing); empty-tree..HEAD shows all committed content as added (meaningful).
      EMPTY_TREE=$(git hash-object -t tree /dev/null 2>/dev/null || echo 4b825dc642cb6eb9a060e54bf8d69288fbee4904)
      MB=$(git merge-base HEAD "$BASE_REF" 2>/dev/null || git rev-parse HEAD~1 2>/dev/null || echo "$EMPTY_TREE")
      [ -n "$MB" ] || MB="$EMPTY_TREE"
      {
        echo "### git diff --stat ($MB..HEAD)"
        git diff --stat "$MB"..HEAD 2>/dev/null || true
        echo
        echo "### git diff --name-only ($MB..HEAD)"
        git diff --name-only "$MB"..HEAD 2>/dev/null || true
        echo
        echo "### committed diff ($MB..HEAD)"
        git diff "$MB"..HEAD 2>/dev/null || true
        echo
        echo "### unstaged working-tree diff (HEAD..worktree)"
        git diff HEAD 2>/dev/null || true
      } > "$OUT"
      echo "DIFF_BASE=$MB"
      echo "DIFF_COMMAND=git diff $MB..HEAD (+ git diff HEAD for unstaged)"
      echo "DIFF_ARTIFACT=$OUT"
      echo "DIFF_BYTES=$(wc -c < "$OUT" 2>/dev/null || echo 0)"

  - id: diff-review
    provider: codex
    agent: codex-adversarial-reviewer
    depends_on: [capture-diff]
    task_class: medium_work
    prompt: |
      You are the Codex adversarial diff reviewer. Cross-model review of the diff that
      major-build just produced, BEFORE it is committed. You are READ-ONLY: you inspect
      and report. You do NOT edit, write, or run commands that mutate state.

      ## Inputs
      Spec: $read-spec.output
      Validator verdict: $war-council-validator.output
      Diff provenance: $capture-diff.output
      (DIFF_BASE, DIFF_COMMAND, DIFF_ARTIFACT above tell you exactly what diff to read.)

      ## Inspect the ACTUAL diff (read-only)
      READ the captured diff at the DIFF_ARTIFACT path from $capture-diff.output (it is
      $ARTIFACTS_DIR/diff.patch). That file IS the diff -- you have no Bash tool, so do
      NOT try to run git yourself. Also use Read/Grep/Glob on the changed files (listed
      under "### git diff --name-only" in the artifact) for fuller context. Focus on what
      tests + the validator can miss:
      1. Contract drift -- response shapes, column counts, export schemas, API signatures
         changed in a way the spec did not authorize.
      2. Unverified claims -- code asserts behavior that no test actually exercises.
      3. Unsafe customer/billing/export behavior -- e.g. an export path that could emit a
         customer-reserved unit, a billing write without an idempotency guard.
      4. Missing tests -- in-scope behavior with no test asserting real output (not just
         "ran without throwing").

      ## Output (STDOUT only -- you cannot write files)
      Emit exactly:
        DIFF_REVIEW=<satisfied|needs_revision>
        FINDINGS:
        - <file:line> <one specific, fixable finding>   (repeat; or "(none)")
        SEMANTIC_RISK=<LOW|MEDIUM|HIGH>
      Be specific: every finding cites a file and the exact problem. "Looks fine" is not
      acceptable; "could be better" is not a finding. Only flag what must change before commit.

  - id: diff-repair
    persona: major-build
    agent: major-build
    depends_on: [diff-review]
    task_class: medium_work
    loop:
      fresh_context: true
      # NF3 + schema fix: the loader REQUIRES loop.until (schemas/loop.ts:11,
      # z.string().min(1)) -- omitting it makes the DAG invalid and the loader
      # SILENTLY DROPS the whole workflow (anchor: 2026-05-30 the entire lane went
      # unregistered). Completion is `sentinel OR until_bash`. To keep until_bash the
      # SOLE real authority (so a premature text sentinel can't short-circuit the
      # flag+debug gate), `until:` is set to a sentinel the agent is instructed to
      # NEVER emit. Thus only until_bash (done.flag exists AND no debug prints in the
      # feature diff) can complete the loop.
      until: __NEVER_EMIT_USE_UNTIL_BASH__
      max_iterations: 3
      until_bash: |
        set -uo pipefail
        # MECHANICAL invariants ONLY. This does NOT prove Codex is satisfied --
        # diff-review-final (a real re-review) does that. Complete when the repair node
        # signalled done AND the feature diff has no obvious mechanical defects.
        DONE="$ARTIFACTS_DIR/diff-repair-done.flag"
        [ -f "$DONE" ] || { echo "repair not signalled done"; exit 1; }
        # F4: implement already committed, so `git diff --cached` is empty. Check the
        # real feature diff: merge-base..HEAD (committed) PLUS HEAD..worktree (unstaged).
        # NF2: empty-tree fallback (not HEAD) so a single-commit/no-base repo still
        # produces a non-empty committed diff to scan for debug prints.
        BASE_REF="origin/${BASE_BRANCH:-main}"
        EMPTY_TREE=$(git hash-object -t tree /dev/null 2>/dev/null || echo 4b825dc642cb6eb9a060e54bf8d69288fbee4904)
        MB=$(git merge-base HEAD "$BASE_REF" 2>/dev/null || git rev-parse HEAD~1 2>/dev/null || echo "$EMPTY_TREE")
        [ -n "$MB" ] || MB="$EMPTY_TREE"
        DEBUG_RE='console\.log\(|debugger;|binding\.pry|import pdb'
        if { git diff --unified=0 "$MB"..HEAD 2>/dev/null; git diff --unified=0 HEAD 2>/dev/null; } \
             | grep -E '^\+' | grep -Eq "$DEBUG_RE"; then
          echo "debug statement present in feature diff"; exit 1
        fi
        exit 0
      prompt: |
        You are major-build. The Codex diff reviewer raised findings on your diff.
        Fix every fixable finding in place. You are the BUILDER; Codex does not edit.

        ## Codex review verdict (read directly -- prompt substitution, not shell)
        $diff-review.output

        ## Prior repair iteration (if any)
        $LOOP_PREV_OUTPUT

        ## What to do
        - If DIFF_REVIEW=satisfied with no findings: make no changes; just signal done.
        - Otherwise: resolve each FINDINGS line. Add the missing test, fix the contract
          drift, close the unsafe path. Modify only in-scope files. Do not reformat
          unrelated code. Do not deploy.

        ## Escalation (ONLY these -- else fix and let the loop continue)
        Write the escalation block to $ARTIFACTS_DIR/diff-repair-escalation.txt and STOP if:
        - a finding requires a new side-effect class / scope the lane was not granted
        - a finding requires human-only authority (deploy, prod write, customer comms,
          irreversible/destructive op) where safe behavior is not already encoded
        - the spec is ambiguous about the correct fix
        - the same finding survived a prior repair attempt and you cannot resolve it
        Escalation block (exact keys):
          ESCALATION_REQUIRED=true
          ESCALATION_REASON=<new-side-effect-class|human-only-authority|ambiguous-spec|loop-exhausted>
          WO_ID=<id>
          NODE=diff-repair
          ATTEMPTS=<n>/3
          WHAT_FAILED=<one paragraph>
          WHAT_WAS_TRIED=<3-6 bullets>
          LAST_REVIEW_FINDINGS=<exact Codex findings>
          SINGLE_DECISION_NEEDED=<one sentence John can answer>
          SAFE_STATE=<work is local in the worktree; nothing committed or pushed yet>

        ## Signal done (the FLAG is the only gate -- there is NO completion token)
        The loop completes ONLY via until_bash, which checks that the done.flag exists
        AND the feature diff has no debug prints. There is NO text sentinel that finishes
        this loop (loop.until is set to a token you must NEVER emit) -- do not try to
        emit one. When you have addressed every fixable finding (or there were none) AND
        introduced no debug prints:
          - Write an empty file at $ARTIFACTS_DIR/diff-repair-done.flag   (the ONLY signal)
        If you escalated or could not resolve a finding, do NOT write the flag: the loop
        will exhaust max_iterations and fail closed, and diff-review-final adjudicates the
        unresolved state. The flag means "repair pass complete", not "semantically
        certified" -- diff-review-final re-checks semantics next.

  # capture-diff-final: refresh the diff artifact AFTER repair so the final reviewer sees
  # the repaired tree, not the pre-repair diff. trigger_rule all_done so it runs even if
  # diff-repair failed/exhausted (F6) -- the final reviewer must still adjudicate.
  - id: capture-diff-final
    depends_on: [diff-repair]
    trigger_rule: all_done
    bash: |
      set -uo pipefail
      mkdir -p "$ARTIFACTS_DIR"
      OUT="$ARTIFACTS_DIR/diff-final.patch"
      BASE_REF="origin/${BASE_BRANCH:-main}"
      # NF2: when there is no merge-base and no HEAD~1 (single-commit / no-base repo),
      # fall back to the empty-tree hash, NOT HEAD. HEAD..HEAD is an EMPTY diff (reviewer
      # sees nothing); empty-tree..HEAD shows all committed content as added (meaningful).
      EMPTY_TREE=$(git hash-object -t tree /dev/null 2>/dev/null || echo 4b825dc642cb6eb9a060e54bf8d69288fbee4904)
      MB=$(git merge-base HEAD "$BASE_REF" 2>/dev/null || git rev-parse HEAD~1 2>/dev/null || echo "$EMPTY_TREE")
      [ -n "$MB" ] || MB="$EMPTY_TREE"
      {
        echo "### committed diff ($MB..HEAD)"
        git diff "$MB"..HEAD 2>/dev/null || true
        echo
        echo "### unstaged working-tree diff (HEAD..worktree)"
        git diff HEAD 2>/dev/null || true
      } > "$OUT"
      echo "DIFF_FINAL_BASE=$MB"
      echo "DIFF_FINAL_ARTIFACT=$OUT"
      echo "DIFF_FINAL_BYTES=$(wc -c < "$OUT" 2>/dev/null || echo 0)"

  - id: diff-review-final
    provider: codex
    agent: codex-adversarial-reviewer
    depends_on: [capture-diff-final]
    trigger_rule: all_done
    task_class: medium_work
    prompt: |
      You are the Codex adversarial reviewer doing the FINAL re-review after repair.
      Read-only. This node decides whether any semantic finding remains before commit --
      the mechanical repair gate did NOT prove your earlier objections were fixed.

      ## Inputs
      Spec: $read-spec.output
      Your original findings: $diff-review.output
      Repair pass output: $diff-repair.output
      Refreshed diff provenance: $capture-diff-final.output
      (Read the repaired diff at DIFF_FINAL_ARTIFACT = $ARTIFACTS_DIR/diff-final.patch.
      You have no Bash tool -- do not run git; read that file.)

      ## Branch on the repair outcome FIRST
      - If diff-repair FAILED or exhausted iterations (its output is empty, shows
        ESCALATION_REQUIRED=true, or the done.flag was never written): do NOT certify.
        Emit DIFF_REVIEW_FINAL=needs_revision, summarize the unresolved repair state in
        UNRESOLVED, and carry through any escalation reason. Never PASS on failed repair.
      - Otherwise: re-inspect the repaired diff. For EACH finding you raised originally,
        verify it is actually resolved in the current tree -- not merely claimed resolved.

      ## Output (STDOUT only)
        DIFF_REVIEW_FINAL=<satisfied|needs_revision>
        UNRESOLVED:
        - <file:line> <finding still open>   (repeat; or "(none)")
        SEMANTIC_RISK=<LOW|MEDIUM|HIGH>
      DIFF_REVIEW_FINAL=satisfied ONLY if every original finding is genuinely resolved and
      no new unsafe behavior was introduced by the repair.

  - id: decide-push-target
    persona: major-build
    depends_on: [diff-review-final]
    task_class: clerical
    prompt: |
      Decide the push target for this BDC feature Work Order.

      ## Inputs
      Spec:
      $read-spec.output

      Validator:
      $war-council-validator.output

      ## Branch Name Derivation Rules (F-6A prevention)
      Anchor incidents 2026-05-18: agents emitted branch names that embedded the
      current worktree thread suffix, producing double-suffixed targets like
      "archon/thread-9772643d-thread-9772643d" or
      "feat/WO-AUTH-RETIRE-GAS-PATH-02-thread-feat/WO-AUTH-RETIRE-GAS-PATH-02".
      The engine ALREADY appends a unique "-thread-<hash>" suffix at push time
      (UNIQUE_BRANCH in commit-and-push). Your job is to emit the BASE branch
      name only.

      - Derive the branch name from the WO ID ONLY. Do NOT copy the current
        git branch name. If running on archon/thread-9772643d, do NOT emit
        that value or any variant of it as push_target.
      - Use prefix feat/, fix/, or wip/ followed by the WO ID in lowercase
        with hyphens. Example: WO-FOO-BAR-01 -> feat/wo-foo-bar-01
      - The branch MUST NOT start with archon/thread- or contain -thread-
        anywhere.
      - The branch MUST NOT embed the current worktree thread hash anywhere
        in its name.
      - Valid examples: feat/wo-auth-retire-gas-path-02, fix/wo-bugs-01, wip/wo-draft-01
      - commit-and-push validates the emitted branch against this allowlist
        regex: ^(feat/[A-Za-z0-9_-]+|fix/[A-Za-z0-9_-]+|wip/[A-Za-z0-9_-]+)$
        and fails closed with "Malformed branch name" on mismatch.

      ## Required Repo Policy
      Extract the target repository from the spec content. Look for any of these patterns (in priority order):
      1. `target_repo: <owner>/<repo>` (YAML field)
      2. `**Target repo:** \`<owner>/<repo>\`` (Markdown bold)
      3. `Target repo: <owner>/<repo>` (plain header)
      4. `**Target Repo:** \`<owner>/<repo>\`` (Markdown bold, capital R)

      The target repo is where the PR must be opened (NOT the worktree's git origin - Rule 29).

      Match the extracted repo against this hardcoded staging-gate list:
      - bluedevilcollectibles/lspro-react
      - bluedevilcollectibles/shopops-storefront
      - bluedevilcollectibles/shopops

      If the repo matches one of those entries, output:
      push_target: feature-branch:<spec-derived-branch-name>
      pr_required: true
      staging_gate_required: true
      repo: <owner>/<repo>

      If the repo is bdc-xo non-doctrine code or another code repo, output:
      push_target: feature-branch:<spec-derived-branch-name>
      pr_required: true
      staging_gate_required: false
      repo: <owner>/<repo>

      If this is doc-only or doctrine-only, output:
      out_of_scope: true
      reason: use bdc-doctrine-update.yaml
      repo: unknown

      CRITICAL: You MUST emit a `repo:` line in every output case. If no target_repo is
      parseable from the spec, emit `repo: unknown` and a WARNING line explaining what is missing.

  # load_bearing: true (WO-167 doctrine, WO-169 anchor)
  # 2026-05-16 engine sortie: container-side `git push` silently failed; downstream
  # `|| echo "STATUS=*_failed"` swallow patterns let the workflow report success
  # while no commits reached origin. Push retry is now real (3 attempts, exponential
  # backoff) and node fails closed if all attempts fail.
  - id: commit-and-push
    persona: overseer
    depends_on: [decide-push-target]
    load_bearing: true
    bash: |
      set -euo pipefail
      # 2026-05-16 quote-fix: substituteNodeOutputRefs with escapedForBash=true wraps
      # the output in single quotes. Wrapping the substitution in double quotes here
      # creates `"'multiline\nagent\noutput'"` which bash mis-tokenizes - line 2+ of
      # the agent output becomes bare commands. Assign directly to bash vars, then
      # quote the var reference. Engine-level fix tracked in WO-HARNESS-NODE-OUTPUT-BASH-QUOTING-01.
      DECIDE_OUTPUT=$decide-push-target.output
      # plan-review emits a fenced output. Extract ONLY the approved-plan block so the
      # changed-file allowlist + commit message never ingest reviewer critique (F8 fix).
      # Must be the revised plan (not pre-review) or a plan-review scope change would be
      # rejected by the allowlist. FAIL CLOSED if the fence is absent (NF1): never fall
      # back to raw output, or PLAN_REVIEW_FINDINGS critique would poison the allowlist.
      PLAN_REVIEW_RAW=$plan-review.output
      PLAN_OUTPUT=$(printf '%s\n' "$PLAN_REVIEW_RAW" | sed -n '/=== APPROVED_PLAN_BEGIN ===/,/=== APPROVED_PLAN_END ===/p' | sed '1d;$d')
      if [ -z "$PLAN_OUTPUT" ]; then
        echo "ERROR: plan-review output missing the APPROVED_PLAN fence -- cannot extract the approved plan (NF1 fail-closed)." >&2
        echo "--- raw plan-review output (for debugging) ---" >&2
        printf '%s\n' "$PLAN_REVIEW_RAW" >&2
        exit 1
      fi
      DIFF_FINAL=$diff-review-final.output
      echo "$DECIDE_OUTPUT"
      if printf '%s\n' "$DECIDE_OUTPUT" | grep -q '^out_of_scope: true'; then
        echo "Out of scope for bdc-feature-development; failing closed." >&2
        exit 1
      fi
      # Irreversible-action gate (doctrine: self-repair-review-loops). commit-and-push is
      # the first irreversible step. The diff-review/repair/final chain must have cleared
      # semantic findings. If the FINAL Codex re-review still says needs_revision, do NOT
      # commit -- surface the escalation payload (if the repair loop wrote one) and stop.
      if ! printf '%s\n' "$DIFF_FINAL" | grep -q '^DIFF_REVIEW_FINAL=satisfied'; then
        echo "ERROR: diff-review-final did not return satisfied -- blocking commit (irreversible-action gate)." >&2
        ESC="$ARTIFACTS_DIR/diff-repair-escalation.txt"
        if [ -f "$ESC" ]; then
          echo "--- ESCALATION (diff-repair) ---" >&2
          cat "$ESC" >&2
        fi
        echo "--- diff-review-final verdict ---" >&2
        printf '%s\n' "$DIFF_FINAL" >&2
        exit 1
      fi
      BRANCH=$(printf '%s\n' "$DECIDE_OUTPUT" | sed -n 's/^push_target: feature-branch://p' | head -n 1)
      if [ -z "$BRANCH" ]; then
        echo "No feature branch target found in decide-push-target output." >&2
        exit 1
      fi
      # F-6A: Validate BRANCH against allowlist regex BEFORE constructing UNIQUE_BRANCH.
      # WO-HARNESS-PUSH-CORRECTNESS-HARDENING-01 (anchor 2026-05-18: three WOs hit
      # double-suffix branch names like archon/thread-9772643d-thread-9772643d).
      # The engine appends -thread-<hash> at push time, so the agent must emit a
      # clean feat/|fix/|wip/ prefix only. archon/thread- prefix is rejected here
      # because it would produce a double-suffix UNIQUE_BRANCH.
      BRANCH_PATTERN='^(feat/[A-Za-z0-9_-]+|fix/[A-Za-z0-9_-]+|wip/[A-Za-z0-9_-]+)$'
      if ! printf '%s\n' "$BRANCH" | grep -Eq "$BRANCH_PATTERN"; then
        echo "Malformed branch name: $BRANCH does not match required pattern feat/|fix/|wip/|archon/thread-" >&2
        exit 1
      fi
      # WO-HARNESS-YAML-USE-THREAD-BRANCH-NOT-FEATURE-BRANCH-01
      # Engine already provides a unique archon/thread-<hash> branch per run.
      # Derive a unique remote push target from it instead of clobbering a shared name.
      THREAD_ID=$(git rev-parse --abbrev-ref HEAD | sed 's|archon/thread-||')
      UNIQUE_BRANCH="${BRANCH}-thread-${THREAD_ID}"
      git status --short
      DIRTY=$(git status --porcelain)
      if [ -z "$DIRTY" ]; then
        # WO-HARNESS-COMMIT-AND-PUSH-ORIGIN-VERIFY-02: do NOT exit 0 here on the
        # "HEAD matches origin" heuristic. The only invariant that matters is
        # origin/${UNIQUE_BRANCH} == local HEAD, verified by ls-remote at the END
        # of this node (after the push loop). A clean tree that already matches
        # origin simply makes the push a no-op + the verify a pass. Falling
        # through (instead of exit 0) guarantees every path hits the final verify.
        # WO-HARNESS-COMMIT-AND-PUSH-BACKSTOP-FALSE-NEGATIVE-01: a clean working
        # tree does NOT mean the implement loop skipped work - it may have committed
        # and left the tree clean. Count COMMITS_AHEAD to distinguish true no-op
        # from pre-committed work that still needs pushing.
        if git rev-parse --quiet --verify "origin/${UNIQUE_BRANCH}" >/dev/null 2>&1; then
          COMMITS_AHEAD=$(git rev-list --count "origin/${UNIQUE_BRANCH}..HEAD" 2>/dev/null || echo 0)
        else
          COMMITS_AHEAD=$(git rev-list --count HEAD --not --remotes=origin 2>/dev/null || echo 0)
        fi
        if [ "$COMMITS_AHEAD" = "0" ]; then
          # F-7C: origin/${UNIQUE_BRANCH} may be missing because the implement
          # loop already pushed to a different remote branch (e.g. the engine's
          # archon/thread-<hash> ref). Search git ls-remote origin for any ref
          # whose HEAD SHA matches local HEAD; if found, retarget UNIQUE_BRANCH
          # to that name and proceed (push will be a no-op).
          # WO-HARNESS-PUSH-CORRECTNESS-HARDENING-01 (anchor 2026-05-18:
          # WO-HARNESS-OVERSEER-FAILURE-CLASSES-EXPANSION-01 12:03 UTC, commit
          # 2d5f6ac0 on origin/archon/thread-9772643d but UNIQUE_BRANCH was
          # archon/thread-9772643d-thread-9772643d).
          LOCAL_HEAD=$(git rev-parse HEAD)
          RECOVERED=$(git ls-remote origin 2>/dev/null \
            | awk -v sha="$LOCAL_HEAD" '$1 == sha {sub(/^refs\/heads\//, "", $2); print $2}' \
            | head -1)
          if [ -n "$RECOVERED" ]; then
            echo "Recovered push target from remote: $RECOVERED"
            UNIQUE_BRANCH="$RECOVERED"
          else
            echo "No changed files and no commits ahead of origin/${UNIQUE_BRANCH} -- implement loop did not produce work" >&2
            exit 1
          fi
        else
          echo "Backstop: $COMMITS_AHEAD commit(s) ahead of origin -- pushing pre-committed work."
        fi
      else
        # Dirty working tree: stage + validate against plan + commit
        CHANGED_FILES=$(printf '%s\n' "$DIRTY" | awk '{print substr($0,4)}')
        # Auto-tolerated files: dependency lockfiles + standard auto-regenerated
        # artifacts managed by package managers during the implement loop.
        # Without this allowlist, adding a dependency causes bun.lock regeneration
        # which trips the strict-allowlist check.
        AUTO_TOLERATED='^(bun\.lock|package-lock\.json|yarn\.lock|pnpm-lock\.yaml|\.bun-tag|node_modules/)$'
        printf '%s\n' "$CHANGED_FILES" | while IFS= read -r path; do
          if [ -z "$path" ]; then
            continue
          fi
          # Skip allowlist check for auto-managed files; just stage them.
          if printf '%s\n' "$path" | grep -Eq "$AUTO_TOLERATED"; then
            echo "Auto-tolerated change (lockfile/managed): $path"
            git add -- "$path"
            continue
          fi
          if ! printf '%s\n' "$PLAN_OUTPUT" | grep -F -- "$path" >/dev/null; then
            echo "Changed file was not listed in plan output: $path" >&2
            exit 1
          fi
          git add -- "$path"
        done
        if git diff --cached --quiet; then
          echo "No changes staged; nothing for backstop to commit." >&2
          exit 0
        fi
        COMMIT_MESSAGE=$(printf '%s\n' "$PLAN_OUTPUT" | sed -n 's/^Commit message: //p' | head -n 1)
        if [ -z "$COMMIT_MESSAGE" ]; then
          # Re-derive WO_ID locally - see post-started for rationale
          WO_ID="${WO_ID:-$(printf '%s\n' "${USER_MESSAGE:-}" | grep -Eo 'WO-[A-Z0-9-]+' | head -n 1 || true)}"
          COMMIT_MESSAGE="feat: ${WO_ID} implementation"
        fi
        git commit -m "$COMMIT_MESSAGE"
      fi

      # WO-169: real retry guard. 3 attempts, 5s/10s/15s backoff, fail closed.
      # No `|| echo 'STATUS=*_failed'` swallow -- this node is load_bearing.
      # WO-HARNESS-YAML-USE-THREAD-BRANCH-NOT-FEATURE-BRANCH-01: push via refspec
      # so the local archon/thread-<hash> branch lands on a unique remote name
      # (UNIQUE_BRANCH) and does not collide with other parallel runs.
      PUSH_OK=false
      for attempt in 1 2 3; do
        if git push origin HEAD:"${UNIQUE_BRANCH}" 2>&1; then
          PUSH_OK=true
          break
        fi
        echo "WARN: push attempt $attempt failed; retrying after $((attempt * 5))s..." >&2
        sleep $((attempt * 5))
      done
      if [ "$PUSH_OK" = "false" ]; then
        echo "ERROR: git push failed after 3 attempts -- aborting workflow (load_bearing node)." >&2
        exit 1
      fi
      # WO-HARNESS-COMMIT-AND-PUSH-ORIGIN-VERIFY-02: the ONLY success invariant.
      # Clean-tree / commits-ahead-0 / HEAD-reachable-from-some-remote are NOT
      # valid proxies. The canonical PR branch MUST be on origin at local HEAD
      # before open-pr-if-needed runs, or work is lost when the worktree is cleaned
      # (anchors: Lane A runs ac2777a3 + f6e24ac2, 2026-05-25 -- both lost the
      # report at open-pr because the branch was never durably on origin).
      REMOTE_HEAD="$(git ls-remote origin "refs/heads/${UNIQUE_BRANCH}" 2>/dev/null | awk '{print $1}')"
      LOCAL_HEAD="$(git rev-parse HEAD)"
      if [ "$REMOTE_HEAD" != "$LOCAL_HEAD" ]; then
        echo "FATAL: canonical branch ${UNIQUE_BRANCH} not durably pushed (origin=${REMOTE_HEAD:-<absent>} local=${LOCAL_HEAD})" >&2
        exit 1
      fi
      echo "VERIFIED: origin/${UNIQUE_BRANCH} == local HEAD (${LOCAL_HEAD})"
      echo "unique_branch=${UNIQUE_BRANCH}"

  # load_bearing: true (WO-167 doctrine, WO-169 anchor)
  - id: open-pr-if-needed
    persona: major-build
    depends_on: [commit-and-push]
    task_class: clerical
    load_bearing: true
    bash: |
      set -euo pipefail
      # 2026-05-16 quote-fix: see commit-and-push for rationale.
      DECIDE_OUTPUT=$decide-push-target.output
      # Extract ONLY the approved-plan block for the PR title/body (F8 fix) -- keep
      # reviewer critique out of the customer-visible PR. FAIL CLOSED if the fence is
      # absent (NF1): never put raw critique-bearing output in the PR body.
      PLAN_REVIEW_RAW=$plan-review.output
      PLAN_OUTPUT=$(printf '%s\n' "$PLAN_REVIEW_RAW" | sed -n '/=== APPROVED_PLAN_BEGIN ===/,/=== APPROVED_PLAN_END ===/p' | sed '1d;$d')
      if [ -z "$PLAN_OUTPUT" ]; then
        echo "ERROR: plan-review output missing the APPROVED_PLAN fence -- cannot build PR body (NF1 fail-closed)." >&2
        exit 1
      fi
      IMPLEMENT_OUTPUT=$implement.output
      VALIDATOR_OUTPUT=$war-council-validator.output
      COMMIT_PUSH_OUTPUT=$commit-and-push.output
      if ! printf '%s\n' "$DECIDE_OUTPUT" | grep -q '^pr_required: true'; then
        echo "PR not required; skipping."
        exit 0
      fi
      # WO-HARNESS-YAML-USE-THREAD-BRANCH-NOT-FEATURE-BRANCH-01: read the unique
      # remote branch the commit-and-push node pushed to; gh pr create must use
      # --head to target that branch rather than the (local) archon/thread-<hash>.
      UNIQUE_BRANCH=$(printf '%s\n' "$COMMIT_PUSH_OUTPUT" | sed -n 's/^unique_branch=//p' | head -n 1)
      if [ -z "$UNIQUE_BRANCH" ]; then
        echo "UNIQUE_BRANCH not found in commit-and-push output." >&2
        exit 1
      fi
      # WO-HARNESS-COMMIT-AND-PUSH-ORIGIN-VERIFY-02: precondition guard. Re-verify
      # the canonical branch is on origin at local HEAD BEFORE attempting any PR.
      # If commit-and-push's verify passed this should always hold; failing here
      # means the branch was lost between nodes -- abort before wasting gh retries.
      REMOTE_HEAD="$(git ls-remote origin "refs/heads/${UNIQUE_BRANCH}" 2>/dev/null | awk '{print $1}')"
      if [ "$REMOTE_HEAD" != "$(git rev-parse HEAD)" ]; then
        echo "FATAL: open-pr precondition failed -- ${UNIQUE_BRANCH} not on origin at HEAD (origin=${REMOTE_HEAD:-<absent>})." >&2
        exit 1
      fi
      # Rule 29: extract explicit repo from decide-push-target output.
      # Never let gh default to the worktree's origin -- it may be bdc-harness
      # even when the spec targets bdc-xo or lspro-react.
      REPO=$(printf '%s\n' "$DECIDE_OUTPUT" | sed -n 's/^repo: //p' | head -n 1)
      if [ -z "$REPO" ] || [ "$REPO" = "unknown" ]; then
        echo "ERROR: decide-push-target did not emit a valid 'repo: <owner>/<repo>'." >&2
        echo "Fix the spec to include 'target_repo:' or '**Target repo:**' and re-run." >&2
        exit 1
      fi
      # F-8C: Rule 20 staging-gate repos (lspro-react, shopops-storefront, shopops)
      # require PRs to target staging instead of the repo default branch.
      # decide-push-target emits "staging_gate_required: true|false"; when true,
      # this node passes --base staging to gh pr create (otherwise it omits --base
      # and lets gh use the repo default).
      # WO-HARNESS-PUSH-CORRECTNESS-HARDENING-01 (closes Rule 20 bypass hole 2026-05-18).
      STAGING_GATE=$(printf '%s\n' "$DECIDE_OUTPUT" | grep -c '^staging_gate_required: true' 2>/dev/null || true)
      STAGING_GATE="${STAGING_GATE:-0}"
      if [ "$STAGING_GATE" -ge 1 ] 2>/dev/null; then
        BASE_BRANCH="staging"
      else
        BASE_BRANCH=""
      fi
      TITLE=$(printf '%s\n' "$PLAN_OUTPUT" | sed -n 's/^Commit message: //p' | head -n 1)
      if [ -z "$TITLE" ]; then
        TITLE="BDC feature Work Order implementation"
      fi
      BODY_FILE=$(mktemp)
      {
        echo "## Summary"
        echo "$PLAN_OUTPUT"
        echo
        echo "## Validation"
        echo "Workflow-time verify-* nodes were removed 2026-05-16 (Patch 1) - agent self-verifies in implement loop;"
        echo "real validation gates run at PR time (codex-review + claude-review + Gitleaks + e2e-smoke + Captain CI)."
        echo "See implement output below for what the builder verified locally."
        echo
        echo "## Implement output"
        echo "$IMPLEMENT_OUTPUT"
        echo
        echo "## Validator"
        echo "$VALIDATOR_OUTPUT"
      } > "$BODY_FILE"
      # WO-169: real retry guard. 3 attempts, 5s/10s/15s backoff, fail closed.
      # No `|| echo 'STATUS=*_failed'` swallow -- this node is load_bearing.
      PR_OK=false
      for attempt in 1 2 3; do
        if gh pr create --repo "$REPO" --title "$TITLE" --body-file "$BODY_FILE" --head "$UNIQUE_BRANCH" ${BASE_BRANCH:+--base "$BASE_BRANCH"} 2>&1; then
          PR_OK=true
          break
        fi
        # Race-condition recovery: branch already has an open PR.
        if [ -n "$UNIQUE_BRANCH" ]; then
          EXIST=$(gh pr list --repo "$REPO" --head "$UNIQUE_BRANCH" --state open \
            --json url --jq '.[0].url // empty' 2>/dev/null || true)
          if [ -n "$EXIST" ]; then
            echo "PR_URL=$EXIST"
            PR_OK=true
            break
          fi
        fi
        echo "WARN: gh pr create attempt $attempt failed; retrying after $((attempt * 5))s..." >&2
        sleep $((attempt * 5))
      done
      if [ "$PR_OK" = "false" ]; then
        # WO-HARNESS-COMMIT-AND-PUSH-ORIGIN-VERIFY-02: gh pr create failed, but the
        # canonical branch was VERIFIED on origin at HEAD above (precondition guard
        # + commit-and-push verify). So the work is NOT lost -- the operator can open
        # the PR manually from the pushed branch. Emit a salvage manifest line so the
        # branch + SHA survive in the run output even though the worktree is cleaned.
        echo "PR_CREATE_FAILED_BUT_BRANCH_SAFE: repo=${REPO} branch=${UNIQUE_BRANCH} sha=$(git rev-parse HEAD)" >&2
        echo "ERROR: gh pr create failed after 3 attempts -- aborting workflow (load_bearing node)." >&2
        echo "RECOVERY: open the PR manually -> gh pr create --repo ${REPO} --head ${UNIQUE_BRANCH} ${BASE_BRANCH:+--base ${BASE_BRANCH}}" >&2
        exit 1
      fi

  - id: build-manifest
    persona: major-build
    depends_on: [open-pr-if-needed]
    task_class: clerical
    prompt: |
      Construct the Captain CI completion manifest for this BDC feature Work Order.

      ## Inputs
      Spec:
      $read-spec.output

      Plan (approved -- reviewed + revised by plan-review; use the APPROVED_PLAN block):
      $plan-review.output

      Implementation:
      $implement.output

      Verification:
      (Workflow-time verify-build/types/tests removed 2026-05-16 - agent self-verifies in
      implement loop, PR-time gates handle real validation. See implement output above.)

      Validator:
      $war-council-validator.output

      Plan review verdict (self-repair loop -- record PLAN_REVIEW_PASS + RISK as evidence):
      $plan-review.output

      Diff review (Codex, initial):
      $diff-review.output

      Diff review (Codex, final after repair):
      $diff-review-final.output

      ## Required Manifest Fields
      - WO ID
      - Files created
      - Files modified
      - Routes added
      - Migrations
      - Tests
      - Commit SHA
      - Validation evidence by WO class
      - PR URL, if opened
      - Staging gate status, if required
      - In-run review evidence (record as evidence, NOT vibes -- doctrine
        self-repair-review-loops): plan-review verdict (PLAN_REVIEW_PASS + RISK);
        diff-review-final verdict (DIFF_REVIEW_FINAL); diff-review provider used
        (codex cross-model, OR claude-fallback with CROSS_MODEL_REVIEW=false disclosed).
        If any in-run review was skipped or ended needs_revision, VALIDATION cannot be PASS.

  - id: flip-notion
    persona: xo
    depends_on: [build-manifest]
    task_class: clerical
    prompt: |
      Update the Notion Work Order page if Notion MCP is available in this runtime.

      ## Required Notion Changes
      - Claude Status: REVIEW
      - Status: Review
      - Add the Captain CI manifest as a page comment

      ## Manifest
      $build-manifest.output

      If Notion MCP is not available inside the container, do not invent a workaround.
      Emit an XO_ACTION line asking XO to flip Notion manually with the manifest above.
