#   After sync, verify: curl -s https://archon.bluedevilcollectibles.com/api/workflows | python -c \
#     "import sys,json; print([w['workflow']['name'] for w in json.load(sys.stdin)['workflows']])"
#   Expected: 'bdc-shopops-billing-statement-v2-01' in output.
