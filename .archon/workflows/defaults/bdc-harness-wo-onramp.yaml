name: bdc-harness-wo-onramp
description: |
  Use when: Firing any BDC product Work Order through Devils Cauldron. This is
  the canonical on-ramp atom â€” it authors a tailored child YAML from the approved
  WO spec, adversarially reviews it, gets operator approval, registers the child
  workflow in Archon, fires it against the target codebase, verifies binding, and
  builds the Captain CI v2 manifest.
  Inputs:
    USER_MESSAGE: WO_ID (e.g. WO-SHOPOPS-PULLLIST-EXPORT-01) plus optional
                  --project <repo> override. WO spec must exist on bdc-xo/main.
  Does: preflight â†’ normalize-spec â†’ generate-yaml (loop) â†’ validate-yaml â†’
        adversarial-review â†’ prefire-plan â†’ approval-gate â†’ register-yaml â†’
        fire-child â†’ verify-binding â†’ build-manifest â†’ flip-notion.
  NOT for: Doctrine-only WOs (use bdc-doctrine-update). Batch authoring
        (use bdc-author-wo-batch). WO authoring from scratch (use bdc-wo-author).
  parallel_ok: false

policyFile: harness/policies/agent-behavior.md
model: sonnet

interactive: true

inputs:
  NOTION_DB_ID:
    default: "a6df831c-0b52-449f-8ca4-d77be6b70d0a"

nodes:

  # Node 1: preflight
  # Fails closed on: gh auth, bdc-xo reachability, ARCHON_OPERATOR_TOKEN, push scope.
  - id: preflight
    load_bearing: true
    bash: |
      set -euo pipefail

      echo "=== preflight: checking gh auth ==="
      if ! gh auth status 2>&1 | grep -q 'Logged in'; then
        echo "ERROR: gh CLI not authenticated. Run 'gh auth login' or set GITHUB_TOKEN." >&2
        exit 1
      fi
      echo "gh auth: OK"

      echo "=== preflight: checking bdc-xo reachability ==="
      if ! gh api repos/bluedevilcollectibles/bdc-xo --jq .id >/dev/null 2>&1; then
        echo "ERROR: cannot reach bluedevilcollectibles/bdc-xo via gh api." >&2
        echo "Check GITHUB_TOKEN scope (needs repo read on bdc-xo)." >&2
        exit 1
      fi
      echo "bdc-xo reachable: OK"

      echo "=== preflight: checking ARCHON_OPERATOR_TOKEN ==="
      if [ -z "${ARCHON_OPERATOR_TOKEN:-}" ]; then
        echo "ERROR: ARCHON_OPERATOR_TOKEN not set in executor env." >&2
        echo "Add it to the harness container env and retry." >&2
        exit 1
      fi
      echo "ARCHON_OPERATOR_TOKEN: present"

      echo "=== preflight: checking git push auth (dry-run) ==="
      PROBE_REF="refs/heads/preflight-auth-probe-$(date +%s)"
      if ! git push --dry-run origin "HEAD:${PROBE_REF}" 2>&1; then
        echo "ERROR: git push dry-run failed â€” container cannot push to origin." >&2
        echo "Likely cause: GITHUB_TOKEN missing push scope or wrong remote." >&2
        exit 1
      fi
      echo "git push auth: OK"

      echo "preflight PASS"

  # Node 2: fetch-spec (bash node — deterministic private-repo fetch)
  # The xo persona has no Bash tool, so spec retrieval MUST be a bash node, not an
  # agent prompt. Runs the gh api fallback chain (proven in bdc-feature-development
  # read-spec). Writes the raw spec to $ARTIFACTS_DIR/source-spec.md. Fails non-zero
  # if nothing is retrieved, so fetch-failure is distinguishable from parse-failure.
  - id: fetch-spec
    load_bearing: true
    depends_on: [preflight]
    bash: |
      set -euo pipefail
      DEST="$ARTIFACTS_DIR/source-spec.md"
      META="$ARTIFACTS_DIR/source-spec.meta"

      # Parse WO_ID from USER_MESSAGE
      WO_ID=$(printf '%s\n' "${USER_MESSAGE:-}" | grep -Eo 'WO-[A-Z][A-Z0-9-]+-[0-9]+' | head -n 1 || true)
      if [ -z "$WO_ID" ]; then
        echo "ERROR: no WO_ID matching WO-[A-Z][A-Z0-9-]+-[0-9]+ in USER_MESSAGE" >&2
        exit 1
      fi

      # Parse --project override (optional)
      TARGET_HINT=$(printf '%s\n' "${USER_MESSAGE:-}" | grep -Eo -- '--project[[:space:]]+[A-Za-z0-9._-]+' | head -n 1 | awk '{print $2}' || true)

      SPEC_CONTENT=""
      SPEC_PATH=""

      # 1) docs/work-orders/<WO_ID>.md
      SPEC_PATH="docs/work-orders/${WO_ID}.md"
      SPEC_CONTENT=$(gh api "repos/bluedevilcollectibles/bdc-xo/contents/${SPEC_PATH}?ref=main" --template '{{.content}}' 2>/dev/null | tr -d '\n' | base64 -d 2>/dev/null || true)

      # 2) docs/superpowers/specs/<WO_ID>.md
      if [ -z "$SPEC_CONTENT" ]; then
        SPEC_PATH="docs/superpowers/specs/${WO_ID}.md"
        SPEC_CONTENT=$(gh api "repos/bluedevilcollectibles/bdc-xo/contents/${SPEC_PATH}?ref=main" --template '{{.content}}' 2>/dev/null | tr -d '\n' | base64 -d 2>/dev/null || true)
      fi

      # 3) date-prefix glob in docs/superpowers/specs/
      if [ -z "$SPEC_CONTENT" ]; then
        MATCH=$(gh api "repos/bluedevilcollectibles/bdc-xo/contents/docs/superpowers/specs?ref=main" --template '{{range .}}{{.path}}{{"\n"}}{{end}}' 2>/dev/null | grep "${WO_ID}.md$" | head -n 1 || true)
        if [ -n "$MATCH" ]; then
          SPEC_PATH="$MATCH"
          SPEC_CONTENT=$(gh api "repos/bluedevilcollectibles/bdc-xo/contents/${SPEC_PATH}?ref=main" --template '{{.content}}' 2>/dev/null | tr -d '\n' | base64 -d 2>/dev/null || true)
        fi
      fi

      # 4) GitHub issue body fallback
      if [ -z "$SPEC_CONTENT" ]; then
        ISSUE_NUM=$(gh issue list --repo bluedevilcollectibles/bdc-xo --search "${WO_ID} in:title" --json number --jq '.[0].number' 2>/dev/null || true)
        if [ -n "$ISSUE_NUM" ] && [ "$ISSUE_NUM" != "null" ]; then
          SPEC_CONTENT=$(gh issue view "$ISSUE_NUM" --repo bluedevilcollectibles/bdc-xo --json body --jq .body 2>/dev/null || true)
          [ -n "$SPEC_CONTENT" ] && SPEC_PATH="bdc-xo:issues/${ISSUE_NUM}"
        fi
      fi

      if [ -z "$SPEC_CONTENT" ]; then
        echo "ERROR: SPEC_MISSING ${WO_ID} not found in bdc-xo (docs/work-orders, docs/superpowers/specs direct, date-glob, issue search)" >&2
        exit 1
      fi

      # Write canonical artifact
      printf '%s\n' "$SPEC_CONTENT" > "$DEST"
      {
        echo "WO_ID=${WO_ID}"
        echo "SPEC_PATH=bdc-xo:${SPEC_PATH}"
        echo "TARGET_HINT=${TARGET_HINT:-unknown}"
        echo "SPEC_BYTES=$(wc -c < "$DEST")"
      } > "$META"

      echo "fetch-spec: wrote $(wc -c < "$DEST") bytes to $DEST"
      echo "WO_ID=${WO_ID}"
      echo "SPEC_PATH=bdc-xo:${SPEC_PATH}"
      echo "TARGET_HINT=${TARGET_HINT:-unknown}"
      echo "SPEC_ARTIFACT=$DEST"
      echo "FETCH_OK=true"

  # Node 2a: normalize-spec (xo prompt — reads the fetched artifact, extracts fields)
  # Reads ONLY $ARTIFACTS_DIR/source-spec.md (written by fetch-spec). Does NOT attempt
  # any gh/repo access (the xo persona has no Bash tool). Pure extraction/judgment.
  - id: normalize-spec
    agent: xo
    context: fresh
    depends_on: [fetch-spec]
    prompt: |
      You are the BDC on-ramp spec normalizer. The spec has ALREADY been fetched by
      the fetch-spec bash node and written to a file. Read ONLY that file and emit a
      normalized block. Do NOT attempt any gh/repo access — you have no shell.

      ## Inputs
      fetch-spec output: $fetch-spec.output
      The raw spec is in the file referenced by SPEC_ARTIFACT (read it with your Read tool).
      WO_ID and TARGET_HINT are in the fetch-spec output above.

      ## Step 1 — Read the spec artifact
      Read the file at the SPEC_ARTIFACT path from fetch-spec output (typically
      $ARTIFACTS_DIR/source-spec.md). That file IS the WO spec body. If you cannot
      read it or it is empty, output `SPEC_MISSING: artifact unreadable` and stop.

      ## Step 2 — Determine TARGET_REPO
      Prefer the TARGET_HINT from fetch-spec output if not "unknown". Otherwise parse
      the spec body for `target_repo:`, `**Target repo:**`, or `Target Repo:` lines.
      Default to `unknown` if not parseable.

      ## Step 3 — Extract fields from the spec body
      - TARGET_REPO: short repo name (e.g. shopops)
      - TARGET_REPO_FULL: bluedevilcollectibles/<TARGET_REPO> (add org prefix if missing)
      - RULE20_STAGING_GATE: true if TARGET_REPO_FULL is one of:
        bluedevilcollectibles/lspro-react, bluedevilcollectibles/shopops-storefront,
        bluedevilcollectibles/shopops. Otherwise false.
      - WO_CLASS: CODE, INFRA, or MIXED (from spec Class field; default CODE)
      - BUSINESS_RISK_INVARIANT: the single most critical must-not-break invariant.
        Derive from the Stop Point / Behavior Source of Truth / any "MUST NEVER break"
        statement. One sentence, specific to THIS WO. Never emit the literal words
        "placeholder", "TODO", "one sentence", or "<BUSINESS_RISK...".
      - IN_SCOPE_FILES: in-scope files (comma-separated)
      - VERIFY_COMMANDS: stop-condition commands (newline-separated)

      ## Required Output Format (emit exactly, no markdown fences)

      ```
      === NORMALIZE-SPEC OUTPUT ===
      WO_ID=<id>
      TARGET_REPO=<repo-short-name-or-unknown>
      TARGET_REPO_FULL=<bluedevilcollectibles/repo-or-unknown>
      RULE20_STAGING_GATE=<true|false>
      WO_CLASS=<CODE|INFRA|MIXED>
      BUSINESS_RISK_INVARIANT=<one sentence>
      IN_SCOPE_FILES=<comma-separated or "(see spec)">
      VERIFY_COMMANDS=<newline-separated commands or "(see spec)">

      === SPEC_CONTENT ===
      <full spec body verbatim from the artifact>
      ```

  # Node 2b: assert-spec-resolved (load-bearing guard)
  # Fails closed if normalize-spec did not retrieve a real spec.
  - id: assert-spec-resolved
    load_bearing: true
    depends_on: [normalize-spec]
    bash: |
      set -euo pipefail
      NORM_OUT=$normalize-spec.output

      if printf '%s\n' "$NORM_OUT" | grep -qE '^SPEC_MISSING:'; then
        MSG=$(printf '%s\n' "$NORM_OUT" | grep '^SPEC_MISSING:' | head -1)
        echo "ERROR: normalize-spec could not retrieve spec: $MSG" >&2
        exit 1
      fi

      SPEC_LEN=$(printf '%s\n' "$NORM_OUT" | awk '/=== SPEC_CONTENT ===/,0' | wc -c || echo 0)
      if [ "${SPEC_LEN:-0}" -lt 200 ]; then
        echo "ERROR: SPEC_CONTENT section missing or too short (${SPEC_LEN} chars)" >&2
        exit 1
      fi

      BRI=$(printf '%s\n' "$NORM_OUT" | sed -n 's/^BUSINESS_RISK_INVARIANT=//p' | head -1)
      if [ -z "$BRI" ]; then
        echo "ERROR: BUSINESS_RISK_INVARIANT missing from normalize-spec output" >&2
        exit 1
      fi
      for BAD in placeholder TODO unknown "BUSINESS_RISK_INVARIANT" "invariant here" "one sentence"; do
        if printf '%s\n' "$BRI" | grep -qi "$BAD"; then
          echo "ERROR: BUSINESS_RISK_INVARIANT is a placeholder: $BRI" >&2
          exit 1
        fi
      done
      if [ "${#BRI}" -lt 20 ]; then
        echo "ERROR: BUSINESS_RISK_INVARIANT too short (${#BRI} chars): $BRI" >&2
        exit 1
      fi

      echo "SPEC_RESOLVED=true"
      echo "BRI ok: $BRI"

  # Node 3: yaml-author (write-capable builder + in-loop validation)
  # major-build authors the child YAML. until_bash runs the full validation after
  # each iteration; failures are written to a feedback file the next iteration reads.
  # The loop IS the validate->fix retry. max_iterations is the retry budget.
  - id: yaml-author
    agent: major-build
    depends_on: [assert-spec-resolved]
    loop:
      fresh_context: true
      until: YAML_READY
      max_iterations: 4
      until_bash: |
        set -uo pipefail
        FEEDBACK="$ARTIFACTS_DIR/yaml-author-validation.txt"
        : > "$FEEDBACK"

        # Resolve the draft filename: prefer a single *.yaml.draft in CWD.
        DRAFT=$(ls -1 *.yaml.draft 2>/dev/null | head -n 1 || true)
        if [ -z "$DRAFT" ] || [ ! -f "$DRAFT" ]; then
          echo "FAIL: no .yaml.draft file found in CWD" >> "$FEEDBACK"
          cat "$FEEDBACK"
          exit 1
        fi

        ERRORS=0

        # Rule 1: model: sonnet at root
        grep -Eq '^model:[[:space:]]*sonnet$' "$DRAFT" || { echo "FAIL Rule 1: missing 'model: sonnet' at root" >> "$FEEDBACK"; ERRORS=$((ERRORS+1)); }

        # Rule 6: policyFile at root
        grep -Eq '^policyFile:[[:space:]]*harness/policies/agent-behavior\.md$' "$DRAFT" || { echo "FAIL Rule 6: missing 'policyFile: harness/policies/agent-behavior.md' at root" >> "$FEEDBACK"; ERRORS=$((ERRORS+1)); }

        # Rule 4/9: no BDC_XO/ prefix in paths
        if grep -E 'BDC_XO/' "$DRAFT" | grep -qv '#'; then echo "FAIL Rule 4/9: BDC_XO/ prefix found (paths must be repo-root-relative)" >> "$FEEDBACK"; ERRORS=$((ERRORS+1)); fi

        # Rule 10: every loop: has until, max_iterations, fresh_context
        LOOP_COUNT=$(grep -c '^[[:space:]]*loop:' "$DRAFT" 2>/dev/null || echo 0)
        if [ "$LOOP_COUNT" -gt 0 ]; then
          UNTIL_COUNT=$(grep -c '[[:space:]]*until:' "$DRAFT" 2>/dev/null || echo 0)
          MAXITER_COUNT=$(grep -c '[[:space:]]*max_iterations:' "$DRAFT" 2>/dev/null || echo 0)
          FC_COUNT=$(grep -c '[[:space:]]*fresh_context:' "$DRAFT" 2>/dev/null || echo 0)
          if [ "$UNTIL_COUNT" -lt "$LOOP_COUNT" ] || [ "$MAXITER_COUNT" -lt "$LOOP_COUNT" ] || [ "$FC_COUNT" -lt "$LOOP_COUNT" ]; then
            echo "FAIL Rule 10: loop blocks missing until/max_iterations/fresh_context (loops=$LOOP_COUNT until=$UNTIL_COUNT maxiter=$MAXITER_COUNT fc=$FC_COUNT)" >> "$FEEDBACK"; ERRORS=$((ERRORS+1));
          fi
        fi

        # Rule 7: flip-notion node present
        grep -q 'id: flip-notion' "$DRAFT" || { echo "FAIL Rule 7: flip-notion node not found" >> "$FEEDBACK"; ERRORS=$((ERRORS+1)); }

        # business-risk-gate present
        grep -q 'id: business-risk-gate' "$DRAFT" || { echo "FAIL: business-risk-gate node not found (required)" >> "$FEEDBACK"; ERRORS=$((ERRORS+1)); }

        # business-risk-gate must be load_bearing: true
        if grep -q 'id: business-risk-gate' "$DRAFT"; then
          if ! awk '/id: business-risk-gate/{f=1} f && /load_bearing: true/{print; f=0}' "$DRAFT" | grep -q '.'; then
            echo "FAIL: business-risk-gate missing load_bearing: true" >> "$FEEDBACK"; ERRORS=$((ERRORS+1));
          fi
        fi

        # Rule 11: no n8n webhook calls
        if grep -E 'n8n\.bluedevilcollectibles\.com' "$DRAFT" | grep -qv '#'; then echo "FAIL Rule 11: n8n webhook call found (hangs in executor subprocess)" >> "$FEEDBACK"; ERRORS=$((ERRORS+1)); fi

        # Placeholder text checks
        for BAD in "placeholder" "TODO" "<BUSINESS_RISK" "invariant here" "one sentence" "BUSINESS_RISK_INVARIANT from normalize"; do
          if grep -qi "$BAD" "$DRAFT" 2>/dev/null; then echo "FAIL: child YAML contains placeholder text: $BAD" >> "$FEEDBACK"; ERRORS=$((ERRORS+1)); break; fi
        done

        # python3 parse
        if ! python3 -c "import yaml,sys; yaml.safe_load(open('$DRAFT'))" 2>>"$FEEDBACK"; then
          echo "FAIL: python3 yaml.safe_load failed -- YAML is not valid (see parse error above)" >> "$FEEDBACK"; ERRORS=$((ERRORS+1));
        fi

        if [ "$ERRORS" -gt 0 ]; then
          echo "" >> "$FEEDBACK"
          echo "$ERRORS validation error(s). Fix every line above and re-draft." >> "$FEEDBACK"
          echo "=== yaml-author validation FAILED ($ERRORS errors) ==="
          cat "$FEEDBACK"
          exit 1
        fi

        echo "ARTIFACTS_DIR=$ARTIFACTS_DIR" >> "$FEEDBACK"
        echo "YAML_READY=true (draft: $DRAFT)"
        exit 0
      prompt: |
        You are major-build. Author a tailored child workflow YAML for the Work
        Order in the normalized spec below, then write it to disk. You have full
        write tools -- you MUST actually create the file.

        ## STEP 0 -- Read prior-iteration validation feedback FIRST
        Run this before anything else:
          cat "$ARTIFACTS_DIR/yaml-author-validation.txt" 2>/dev/null || echo "(no prior feedback -- first iteration)"
        If the file lists failures, FIX EVERY ONE of them in this iteration. Do not
        repeat a mistake the previous iteration already made.

        ## GUARD -- fail closed if spec is incomplete
        Check the normalized spec input. If any of these, emit YAML_DRAFT_FAILURE
        with a reason and STOP (do NOT draft, do NOT emit YAML_READY):
        1. SPEC_MISSING present -> reason=spec-not-retrieved
        2. BUSINESS_RISK_INVARIANT missing/empty/placeholder -> reason=placeholder-invariant
        3. SPEC_CONTENT < 200 chars -> reason=spec-too-short

        ## Inputs
        Normalized spec: $normalize-spec.output

        ## Base pattern
        Use bdc-feature-development.yaml as the structural base:
        preflight-github-auth (load_bearing) -> read-spec -> plan -> implement
        (loop, major-build, fresh_context: true, until: COMPLETE, max_iterations: 5)
        -> war-council-validator -> business-risk-gate -> decide-push-target ->
        commit-and-push (load_bearing) -> open-pr-if-needed (load_bearing) ->
        build-manifest (trigger_rule: all_done) -> flip-notion.

        ## Tailoring requirements

        1. Bake in WO_ID at root so the child needs no USER_MESSAGE at fire time:
           inputs:
             WO_ID:
               default: "<WO_ID from normalize-spec>"

        2. Add a business-risk-gate node (load_bearing: true) before decide-push-target
           that fails closed if the WO's BUSINESS_RISK_INVARIANT is violated. Put the
           ACTUAL invariant text from normalize-spec into the node -- never the literal
           words "placeholder", "TODO", "one sentence", or "<BUSINESS_RISK...".

        3. If RULE20_STAGING_GATE=true: decide-push-target and commit-and-push must use
           --base staging for the PR.

        4. Child YAML filename: lowercase the WO_ID, replace WO- prefix with bdc-,
           replace underscores with hyphens. Write to <slug>.yaml.draft in CWD.

        ## Hard rules the child YAML MUST satisfy (validated by until_bash after you finish)
        - model: sonnet at root
        - policyFile: harness/policies/agent-behavior.md at root
        - every loop: has prompt + until + max_iterations + fresh_context
        - paths repo-root-relative (no BDC_XO/ prefix)
        - no n8n webhook calls
        - flip-notion final node; business-risk-gate present and load_bearing: true
        - no placeholder text anywhere

        ## Output
        1. WRITE the file <slug>.yaml.draft to disk (you have write tools -- use them).
        2. Emit this footer:
           === YAML-AUTHOR RESULT ===
           YAML_FILENAME=<slug>.yaml.draft
           WO_SLUG=<bdc-slug>
           WO_ID=<WO_ID>
           TARGET_REPO_FULL=<bluedevilcollectibles/repo>
           RULE20_STAGING_GATE=<true|false>
           BUSINESS_RISK_INVARIANT=<one sentence, verbatim from spec>
        3. Emit the sentinel YAML_READY on its own line.

        The until_bash gate validates your draft after this iteration. If it fails,
        you will see the errors in the feedback file next iteration -- fix them.

  # Node 4: assert-yaml-ready (load-bearing hard gate, defense-in-depth)
  # Even if the loop exhausted iterations or emitted the sentinel without a valid
  # draft, this gate re-runs the parse + key structural checks and fails the run
  # cleanly rather than letting a bad draft reach adversarial-review/register.
  - id: assert-yaml-ready
    load_bearing: true
    depends_on: [yaml-author]
    bash: |
      set -euo pipefail
      AUTHOR_OUT=$yaml-author.output

      YAML_FILENAME=$(printf '%s\n' "$AUTHOR_OUT" | sed -n 's/^YAML_FILENAME=//p' | head -n 1)
      WO_SLUG=$(printf '%s\n' "$AUTHOR_OUT" | sed -n 's/^WO_SLUG=//p' | head -n 1)

      # Fall back to globbing if the footer was malformed
      if [ -z "$YAML_FILENAME" ] || [ ! -f "$YAML_FILENAME" ]; then
        YAML_FILENAME=$(ls -1 *.yaml.draft 2>/dev/null | head -n 1 || true)
      fi
      if [ -z "$YAML_FILENAME" ] || [ ! -f "$YAML_FILENAME" ]; then
        echo "ERROR: yaml-author produced no .yaml.draft file -- run failed clean (no dead-end)." >&2
        printf '%s\n' "$AUTHOR_OUT" | grep -q 'YAML_DRAFT_FAILURE' && echo "yaml-author hit YAML_DRAFT_FAILURE." >&2
        exit 1
      fi

      # Hard re-check: parse + structural musts
      python3 -c "import yaml,sys; yaml.safe_load(open('$YAML_FILENAME'))" 2>/dev/null || { echo "ERROR: draft does not parse as YAML" >&2; exit 1; }
      grep -q 'id: business-risk-gate' "$YAML_FILENAME" || { echo "ERROR: business-risk-gate missing" >&2; exit 1; }
      grep -q 'id: flip-notion' "$YAML_FILENAME" || { echo "ERROR: flip-notion missing" >&2; exit 1; }
      for BAD in "placeholder" "<BUSINESS_RISK" "invariant here" "one sentence"; do
        if grep -qi "$BAD" "$YAML_FILENAME"; then echo "ERROR: placeholder text remains: $BAD" >&2; exit 1; fi
      done

      echo "YAML_VALID=true"
      echo "YAML_FILENAME=$YAML_FILENAME"
      echo "WO_SLUG=$WO_SLUG"
      echo "assert-yaml-ready PASS"

  # Node 4b: war-council-review (read-only structure critique)
  # The architect reviews the drafted child YAML for structural/architectural
  # soundness BEFORE the overseer attacks risk. Read-only -- suggests, does not write.
  - id: war-council-review
    agent: war-council-architect
    context: fresh
    depends_on: [assert-yaml-ready]
    prompt: |
      You are the War Council Architect. Review the drafted child workflow YAML for
      STRUCTURAL and ARCHITECTURAL soundness. You are read-only -- you critique, you
      do not edit. The builder (major-build) already authored it and it passed
      mechanical validation; your job is the judgment layer the validator cannot do.

      ## Inputs
      Normalized spec: $normalize-spec.output
      yaml-author output: $yaml-author.output
      assert-yaml-ready output: $assert-yaml-ready.output

      Read the YAML at YAML_FILENAME (from assert-yaml-ready output).

      ## Review dimensions
      1. Node DAG shape: do depends_on edges form a sensible order? Any orphan nodes?
      2. Does the implement loop's scope match the spec's in-scope files (no creep)?
      3. Is the business-risk-gate placed where it actually guards the risk surface
         (before the push, not after)?
      4. Rule 20: if the target repo is customer-facing, is staging enforced correctly?
      5. Does flip-notion target the CHILD product WO (not the on-ramp's own WO)?

      ## Output
      === WAR-COUNCIL-REVIEW ===
      STRUCTURE_OK=<true|false>
      CONCERNS:
      <bullet list of structural issues, or "(none)">
      RECOMMENDATION=<PROCEED|REVISE>

      This is advisory context for the overseer and the operator. It does not block
      by itself -- the overseer's adversarial pass and the operator's approval are the
      gates.

  # Node 5: adversarial-review
  # Scores 8 criteria 1-10. Any score <7 sets ADV_PASS=false.
  - id: adversarial-review
    agent: overseer-opus
    effort: xhigh
    context: fresh
    depends_on: [war-council-review]
    prompt: |
      You are an adversarial YAML reviewer with no benefit of the doubt. Score the
      child workflow YAML drafted by generate-yaml on 8 criteria (1-10 each).
      Any score below 7 fails the review.

      ## Inputs
      Normalized spec: $normalize-spec.output
      yaml-author output: $yaml-author.output
      assert-yaml-ready output: $assert-yaml-ready.output

      Read the YAML file at path YAML_FILENAME from assert-yaml-ready output.

      ## 8 Scoring Criteria

      1. **Spec fidelity** (1-10): Does the child YAML implement what the WO spec actually requires?
         Check: does it hardcode the correct WO_ID? Does IN_SCOPE_FILES match the plan node's scope?
         Score <7 if child YAML adds out-of-scope work or omits any in-scope file.

      2. **Business-risk-gate correctness** (1-10): Does the business-risk-gate node's invariant
         match BUSINESS_RISK_INVARIANT from the spec exactly (or closely)? Is it load_bearing: true?
         Does it fail closed (set -euo pipefail; exit 1 path exists)?
         Score <7 if invariant is generic/wrong or the node lacks fail-closed logic.

      3. **Rule 20 compliance** (1-10): If RULE20_STAGING_GATE=true, does the child YAML enforce
         staging branch as PR base? If false, does it correctly skip that gate?
         Score <7 if the gate is wrong direction.

      4. **Loop correctness** (1-10): Every loop: block has prompt, until, max_iterations (<=5),
         fresh_context: true. Sentinel is specific (not just "DONE").
         Score <7 if any loop block is missing a required sibling.

      5. **Load-bearing correctness** (1-10): preflight-github-auth, commit-and-push,
         open-pr-if-needed, business-risk-gate are all load_bearing: true. No swallow patterns
         (`|| echo "STATUS=failed"`) on those nodes.
         Score <7 if any load-bearing node can silently succeed on failure.

      6. **Path hygiene** (1-10): All file paths relative to repo root. No BDC_XO/ prefix.
         No n8n webhook URLs. No absolute paths unless in `/host-artifacts/`.
         Score <7 if any violation found.

      7. **Flip-notion correctness** (1-10): flip-notion is the final node, depends on build-manifest,
         flips the product WO (not the on-ramp's own WO), and includes manifest paste.
         Score <7 if flip-notion targets the wrong WO or is not final.

      8. **Idempotency** (1-10): Running the child YAML twice on the same WO produces no duplicate
         commits, no duplicate Notion pages, no duplicate PRs. The implement loop has a
         "spec already implemented?" guard or uses git diff to detect no-op.
         Score <7 if second run would create duplicates without guards.

      ## Required Output Format

      ```
      === ADVERSARIAL-REVIEW SCORES ===
      1. Spec fidelity: <score>/10 â€” <one-line finding>
      2. Business-risk-gate: <score>/10 â€” <one-line finding>
      3. Rule 20 compliance: <score>/10 â€” <one-line finding>
      4. Loop correctness: <score>/10 â€” <one-line finding>
      5. Load-bearing correctness: <score>/10 â€” <one-line finding>
      6. Path hygiene: <score>/10 â€” <one-line finding>
      7. Flip-notion correctness: <score>/10 â€” <one-line finding>
      8. Idempotency: <score>/10 â€” <one-line finding>

      RISK=<LOW|MEDIUM|HIGH>
      ADV_PASS=<true|false>
      RECOMMENDATION=<PROCEED|REVISE>

      UNRESOLVED CONCERNS:
      <bullet list of any score <7 with specific fix required, or "(none)" if all >= 7>
      ```

      RISK=HIGH if any score <= 5. RISK=MEDIUM if any score is 6. RISK=LOW if all >= 7.
      ADV_PASS=true only if ALL 8 scores >= 7.
      RECOMMENDATION=PROCEED only if ADV_PASS=true.

  # Node 6: prefire-plan
  # Assembles the pre-fire packet shown to the operator at approval-gate.
  - id: prefire-plan
    agent: xo
    context: fresh
    depends_on: [adversarial-review]
    prompt: |
      Assemble the pre-fire packet for operator approval. This is exactly what
      the operator sees before deciding to fire the child workflow.

      ## Inputs
      Normalized spec: $normalize-spec.output
      yaml-author output: $yaml-author.output
      assert-yaml-ready output: $assert-yaml-ready.output
      Adversarial review: $adversarial-review.output

      ## Step 1 â€” Duplicate-run check
      Call:
        curl -fsS --max-time 15 "https://archon.bluedevilcollectibles.com/api/workflows/runs?limit=30"
      Parse the response to find any run whose initial_message or message contains the WO_ID
      AND whose status is running, pending, or queued.
      If found, emit `DUPLICATE_RUN_DETECTED: <run_id>|<status>`.
      If not found or API unreachable, emit `DUPLICATE_CHECK=clean` or `DUPLICATE_CHECK=skipped`.

      ## Step 2 â€” Assemble packet

      Emit the following block (no markdown fences):

      ```
      === PRE-FIRE PACKET ===
      WO_ID=<from normalize-spec>
      TARGET_REPO=<from normalize-spec>
      TARGET_REPO_FULL=<from normalize-spec>
      WO_SLUG=<from generate-yaml>
      YAML_FILENAME=<from generate-yaml>
      RULE20_STAGING_GATE=<from normalize-spec>
      WO_CLASS=<from normalize-spec>
      BUSINESS_RISK_INVARIANT=<from normalize-spec>
      ADV_PASS=<from adversarial-review>
      RISK=<from adversarial-review>
      DUPLICATE_CHECK=<clean|skipped|DUPLICATE_RUN_DETECTED: ...>

      What approval authorizes (two side effects):
        1. Register <YAML_FILENAME> to .archon/workflows/defaults/ via gh api PUT
           (commits to bdc-harness dev branch, rebuilds Archon container)
        2. POST /api/conversations to fire <WO_SLUG> against <TARGET_REPO_FULL>

      Adversarial review summary:
      <paste SCORES block from adversarial-review output>

      UNRESOLVED CONCERNS:
      <paste from adversarial-review>
      ```

      ## Foot note for operator
      If ADV_PASS=false, the approval-gate message will show "ADV_PASS=false â€” type 'override adv' to proceed anyway."

  # Node 7: approval-gate
  # Operator reviews the pre-fire packet and approves or rejects.
  - id: approval-gate
    depends_on: [prefire-plan]
    approval:
      message: |
        Review the pre-fire packet above.

        Two side effects will be authorized:
          1. Register the child YAML to bdc-harness .archon/workflows/defaults/ via gh api PUT
          2. Fire the child workflow against the target codebase via POST /api/conversations

        If ADV_PASS=false is shown in the packet, type "override adv" to proceed anyway.
        If DUPLICATE_RUN_DETECTED is shown, type "fire anyway" to override.

        - "approved" / "proceed" / "yes" / "fire" â†’ proceed
        - "no" / "reject" / "stop" â†’ halt (child YAML is still on disk, register/fire skipped)
      capture_response: true
      on_reject:
        prompt: |
          The operator rejected the pre-fire packet. Summarize what was rejected and
          what would need to change before re-submitting. Do not re-fire automatically.
          Output: OPERATOR_REJECTED: <reason from approval response>
        max_attempts: 2

  # Node 8: register-yaml
  # Registers the child YAML to bdc-harness via gh api (API-only, no local git checkout).
  # Primary: gh api PUT /contents (idempotent with existing SHA).
  # Fallback: branch â†’ PUT contents â†’ PR â†’ merge.
  # Then PUT /api/workflows and poll until registered.
  - id: register-yaml
    load_bearing: true
    depends_on: [approval-gate]
    bash: |
      set -euo pipefail
      PREFIRE=$prefire-plan.output
      APPROVAL=$approval-gate.output

      WO_ID=$(printf '%s\n' "$PREFIRE" | sed -n 's/^WO_ID=//p' | head -n 1)
      WO_SLUG=$(printf '%s\n' "$PREFIRE" | sed -n 's/^WO_SLUG=//p' | head -n 1)
      YAML_FILENAME=$(printf '%s\n' "$PREFIRE" | sed -n 's/^YAML_FILENAME=//p' | head -n 1)
      TARGET_REPO_FULL=$(printf '%s\n' "$PREFIRE" | sed -n 's/^TARGET_REPO_FULL=//p' | head -n 1)
      ADV_PASS=$(printf '%s\n' "$PREFIRE" | sed -n 's/^ADV_PASS=//p' | head -n 1)

      # Guard: approval required
      if ! printf '%s\n' "$APPROVAL" | grep -iqE 'approved|proceed|^yes|fire'; then
        echo "register-yaml: approval not granted (got: $APPROVAL) â€” halting" >&2
        exit 1
      fi

      # Guard: ADV_PASS check (bypass only if operator typed "override adv")
      if [ "$ADV_PASS" != "true" ]; then
        if ! printf '%s\n' "$APPROVAL" | grep -iq 'override adv'; then
          echo "ERROR: ADV_PASS=false and operator did not type 'override adv' â€” halting" >&2
          exit 1
        fi
        echo "WARN: adversarial review failed but operator overrode with 'override adv'"
      fi

      # Guard: duplicate run override
      DUP_LINE=$(printf '%s\n' "$PREFIRE" | grep -E '^DUPLICATE_CHECK=' | head -n 1 || true)
      if printf '%s\n' "$DUP_LINE" | grep -q 'DUPLICATE_RUN_DETECTED'; then
        if ! printf '%s\n' "$APPROVAL" | grep -iq 'fire anyway'; then
          echo "ERROR: DUPLICATE_RUN_DETECTED and operator did not type 'fire anyway' â€” halting" >&2
          exit 1
        fi
        echo "WARN: operator overrode duplicate run detection with 'fire anyway'"
      fi

      if [ -z "$YAML_FILENAME" ] || [ ! -f "$YAML_FILENAME" ]; then
        echo "ERROR: YAML draft file '$YAML_FILENAME' not found on disk" >&2
        exit 1
      fi

      DEST_PATH=".archon/workflows/defaults/${WO_SLUG}.yaml"
      YAML_CONTENT=$(base64 < "$YAML_FILENAME" | tr -d '\n')
      COMMIT_MSG="feat(on-ramp): register ${WO_SLUG} child workflow via bdc-harness-wo-onramp"
      HARNESS_REPO="bluedevilcollectibles/bdc-harness"

      echo "=== register-yaml: Step 1 â€” GET /api/codebases to resolve default_cwd ==="
      CODEBASES=$(curl -fsS --max-time 15 \
        "https://archon.bluedevilcollectibles.com/api/codebases" \
        -H "x-archon-operator-token: ${ARCHON_OPERATOR_TOKEN}" 2>/dev/null || echo '{}')
      DEFAULT_CWD=$(printf '%s\n' "$CODEBASES" \
        | python3 -c "import sys,json; data=json.load(sys.stdin); cbs=data if isinstance(data,list) else data.get('codebases',[]); [print(cb.get('default_cwd',cb.get('cwd',''))) for cb in cbs if 'bdc-harness' in (cb.get('name','') or '') or (cb.get('name','') or '')==('bluedevilcollectibles/bdc-harness')]" \
        2>/dev/null || echo "")
      echo "DEFAULT_CWD=${DEFAULT_CWD:-<not found>}"

      echo "=== register-yaml: Step 2 â€” primary: gh api PUT /contents ==="
      # Check for existing file SHA (needed for idempotent PUT)
      EXISTING_SHA=$(gh api "repos/${HARNESS_REPO}/contents/${DEST_PATH}?ref=dev" \
        --jq .sha 2>/dev/null || echo "")

      PUT_BODY="{\"message\":\"${COMMIT_MSG}\",\"content\":\"${YAML_CONTENT}\",\"branch\":\"dev\"}"
      if [ -n "$EXISTING_SHA" ]; then
        PUT_BODY="{\"message\":\"${COMMIT_MSG}\",\"content\":\"${YAML_CONTENT}\",\"sha\":\"${EXISTING_SHA}\",\"branch\":\"dev\"}"
      fi

      PRIMARY_OK=false
      if gh api -X PUT "repos/${HARNESS_REPO}/contents/${DEST_PATH}" \
          --input - <<< "$PUT_BODY" --jq .commit.sha 2>/dev/null; then
        PRIMARY_OK=true
        echo "Primary gh api PUT: OK"
      fi

      if [ "$PRIMARY_OK" = "false" ]; then
        echo "=== register-yaml: Step 3 â€” fallback: branch â†’ PUT â†’ PR â†’ merge ==="
        FALLBACK_BRANCH="on-ramp/register-${WO_SLUG}-$(date +%Y%m%d%H%M%S)"

        # Create branch off dev
        DEV_SHA=$(gh api "repos/${HARNESS_REPO}/git/refs/heads/dev" --jq .object.sha 2>/dev/null || "")
        if [ -z "$DEV_SHA" ]; then
          echo "ERROR: cannot resolve dev branch SHA in ${HARNESS_REPO}" >&2
          exit 1
        fi
        gh api -X POST "repos/${HARNESS_REPO}/git/refs" \
          -f ref="refs/heads/${FALLBACK_BRANCH}" \
          -f sha="$DEV_SHA" 2>&1 || { echo "ERROR: fallback branch creation failed" >&2; exit 1; }

        # PUT file on fallback branch
        FALLBACK_BODY="{\"message\":\"${COMMIT_MSG}\",\"content\":\"${YAML_CONTENT}\",\"branch\":\"${FALLBACK_BRANCH}\"}"
        REGISTERED_SHA=$(gh api -X PUT "repos/${HARNESS_REPO}/contents/${DEST_PATH}" \
          --input - <<< "$FALLBACK_BODY" --jq .commit.sha 2>/dev/null || echo "")
        if [ -z "$REGISTERED_SHA" ]; then
          echo "ERROR: fallback PUT /contents failed" >&2
          exit 1
        fi

        # Open PR and merge
        PR_NUM=$(gh pr create --repo "$HARNESS_REPO" \
          --base dev --head "$FALLBACK_BRANCH" \
          --title "$COMMIT_MSG" \
          --body "Auto-generated by bdc-harness-wo-onramp register-yaml fallback path. WO: ${WO_ID}" \
          --json number --jq .number 2>/dev/null || echo "")
        if [ -n "$PR_NUM" ]; then
          gh pr merge "$PR_NUM" --repo "$HARNESS_REPO" --squash --auto 2>/dev/null || \
          gh api -X PUT "repos/${HARNESS_REPO}/pulls/${PR_NUM}/merge" \
            -f merge_method=squash 2>/dev/null || true
          echo "Fallback PR #${PR_NUM} merged"
        else
          echo "WARN: fallback PR create failed â€” file is committed on ${FALLBACK_BRANCH}" >&2
        fi
      fi

      echo "=== register-yaml: Step 4 â€” PUT /api/workflows/<name> ==="
      CWD_PARAM=""
      [ -n "$DEFAULT_CWD" ] && CWD_PARAM="?cwd=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote('$DEFAULT_CWD'))")"
      curl -fsS -X PUT \
        "https://archon.bluedevilcollectibles.com/api/workflows/${WO_SLUG}${CWD_PARAM}" \
        -H "Content-Type: application/json" \
        -H "x-archon-operator-token: ${ARCHON_OPERATOR_TOKEN}" \
        -d "{\"reload\":true}" 2>/dev/null || echo "WARN: PUT /api/workflows reload returned non-200 (non-fatal)"

      echo "=== register-yaml: Step 5 â€” poll GET /api/workflows until registered (60s max) ==="
      REGISTERED=false
      for i in $(seq 1 12); do
        FOUND=$(curl -fsS --max-time 10 \
          "https://archon.bluedevilcollectibles.com/api/workflows" \
          -H "x-archon-operator-token: ${ARCHON_OPERATOR_TOKEN}" 2>/dev/null \
          | python3 -c "import sys,json; data=json.load(sys.stdin); ws=data if isinstance(data,list) else data.get('workflows',[]); [print('found') for w in ws if (w.get('workflow',w)).get('name','')==('${WO_SLUG}')] " \
          2>/dev/null || echo "")
        if [ "$FOUND" = "found" ]; then
          REGISTERED=true
          echo "Workflow ${WO_SLUG} registered after $((i*5))s"
          break
        fi
        echo "Polling... attempt $i/12"
        sleep 5
      done

      if [ "$REGISTERED" = "false" ]; then
        echo "ERROR: ${WO_SLUG} did not appear in /api/workflows after 60s" >&2
        echo "The YAML was committed but Archon may need a container rebuild." >&2
        echo "Run: BDC_XO/scripts/archon-bridge/sync-workflows.sh ${WO_SLUG}.yaml" >&2
        exit 1
      fi

      # Resolve registered SHA
      REGISTERED_SHA=$(gh api "repos/${HARNESS_REPO}/contents/${DEST_PATH}?ref=dev" \
        --jq .sha 2>/dev/null || echo "unknown")

      echo "REGISTERED_OK=true"
      echo "REGISTERED_SHA=${REGISTERED_SHA}"
      echo "WO_ID=${WO_ID}"
      echo "TARGET_REPO_FULL=${TARGET_REPO_FULL}"
      echo "WO_SLUG=${WO_SLUG}"
      echo "DEFAULT_CWD=${DEFAULT_CWD:-unknown}"
      echo "DEST_PATH=${DEST_PATH}"

  # Node 9: fire-child
  # POSTs /api/conversations with workflowName to fire the registered child workflow.
  - id: fire-child
    load_bearing: true
    depends_on: [register-yaml]
    bash: |
      set -euo pipefail
      REG_OUT=$register-yaml.output
      APPROVAL=$approval-gate.output

      # Re-check approval in case trigger_rule brings us here unexpectedly
      if ! printf '%s\n' "$APPROVAL" | grep -iqE 'approved|proceed|^yes|fire'; then
        echo "fire-child: approval not granted â€” skipping fire" >&2
        exit 1
      fi

      WO_ID=$(printf '%s\n' "$REG_OUT" | sed -n 's/^WO_ID=//p' | head -n 1)
      WO_SLUG=$(printf '%s\n' "$REG_OUT" | sed -n 's/^WO_SLUG=//p' | head -n 1)
      TARGET_REPO_FULL=$(printf '%s\n' "$REG_OUT" | sed -n 's/^TARGET_REPO_FULL=//p' | head -n 1)
      TARGET_REPO=$(printf '%s\n' "$TARGET_REPO_FULL" | sed 's|bluedevilcollectibles/||')

      if [ -z "$WO_SLUG" ] || [ -z "$TARGET_REPO_FULL" ]; then
        echo "ERROR: WO_SLUG or TARGET_REPO_FULL missing from register-yaml output" >&2
        exit 1
      fi

      REGISTERED_OK=$(printf '%s\n' "$REG_OUT" | sed -n 's/^REGISTERED_OK=//p' | head -n 1)
      if [ "$REGISTERED_OK" != "true" ]; then
        echo "ERROR: register-yaml did not emit REGISTERED_OK=true â€” aborting fire" >&2
        exit 1
      fi

      FIRE_MESSAGE="Execute ${WO_ID} --project ${TARGET_REPO}"
      echo "Firing: workflowName=${WO_SLUG} message='${FIRE_MESSAGE}' repo=${TARGET_REPO_FULL}"

      RESPONSE=$(curl -fsS -X POST \
        "https://archon.bluedevilcollectibles.com/api/conversations" \
        -H "Content-Type: application/json" \
        -H "x-archon-operator-token: ${ARCHON_OPERATOR_TOKEN}" \
        --max-time 30 \
        -d "{
          \"workflowName\": \"${WO_SLUG}\",
          \"message\": \"${FIRE_MESSAGE}\",
          \"inputs\": {\"WO_ID\": \"${WO_ID}\"}
        }" 2>&1)

      RUN_ID=$(printf '%s\n' "$RESPONSE" \
        | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('id') or d.get('conversation_id') or d.get('run_id') or 'unknown')" \
        2>/dev/null || echo "parse_failed")

      if [ "$RUN_ID" = "parse_failed" ] || [ "$RUN_ID" = "unknown" ]; then
        echo "WARN: could not parse run ID from response: $RESPONSE" >&2
      fi

      echo "FIRE_OK=true"
      echo "RUN_ID=${RUN_ID}"
      echo "WO_ID=${WO_ID}"
      echo "WO_SLUG=${WO_SLUG}"
      echo "TARGET_REPO=${TARGET_REPO}"
      echo "TARGET_REPO_FULL=${TARGET_REPO_FULL}"
      echo "FIRE_RESPONSE=${RESPONSE}"

  # Node 10: verify-binding
  # Polls /api/workflows/runs up to 90s. Asserts bound repo matches TARGET_REPO_FULL.
  - id: verify-binding
    load_bearing: true
    depends_on: [fire-child]
    bash: |
      set -euo pipefail
      FIRE_OUT=$fire-child.output

      RUN_ID=$(printf '%s\n' "$FIRE_OUT" | sed -n 's/^RUN_ID=//p' | head -n 1)
      WO_ID=$(printf '%s\n' "$FIRE_OUT" | sed -n 's/^WO_ID=//p' | head -n 1)
      WO_SLUG=$(printf '%s\n' "$FIRE_OUT" | sed -n 's/^WO_SLUG=//p' | head -n 1)
      EXPECTED_REPO=$(printf '%s\n' "$FIRE_OUT" | sed -n 's/^TARGET_REPO_FULL=//p' | head -n 1)

      echo "=== verify-binding: polling for run (RUN_ID=${RUN_ID}) up to 90s ==="

      BINDING_OK=false
      BOUND_REPO=""

      for i in $(seq 1 18); do
        RUNS_JSON=$(curl -fsS --max-time 15 \
          "https://archon.bluedevilcollectibles.com/api/workflows/runs?limit=50" \
          -H "x-archon-operator-token: ${ARCHON_OPERATOR_TOKEN}" 2>/dev/null || echo '{}')

        MATCH=$(printf '%s\n' "$RUNS_JSON" \
          | RUN_ID="${RUN_ID}" WO_ID="${WO_ID}" WO_SLUG="${WO_SLUG}" python3 -c "
          import sys,json,os
          data=json.load(sys.stdin)
          runs=data if isinstance(data,list) else data.get('runs',[])
          run_id=os.environ.get('RUN_ID',''); wo_id=os.environ.get('WO_ID',''); wo_slug=os.environ.get('WO_SLUG','')
          next((print(str(r.get('codebase','') or r.get('repo','') or r.get('repository','') or '')+'|'+r.get('status','unknown')) for r in runs if str(r.get('id',''))==run_id or wo_id in (r.get('initial_message','') or r.get('message','') or '') or wo_slug in (r.get('workflow_name','') or r.get('workflowName',''))), None)
          " 2>/dev/null || echo "")

        if [ -n "$MATCH" ]; then
          BOUND_REPO=$(printf '%s\n' "$MATCH" | cut -d'|' -f1)
          RUN_STATUS=$(printf '%s\n' "$MATCH" | cut -d'|' -f2)
          echo "Run found: bound_repo=${BOUND_REPO} status=${RUN_STATUS}"

          # Normalize repo: add org prefix if missing
          BOUND_NORMALIZED="$BOUND_REPO"
          if ! printf '%s\n' "$BOUND_REPO" | grep -q '/'; then
            BOUND_NORMALIZED="bluedevilcollectibles/${BOUND_REPO}"
          fi

          if [ "$BOUND_NORMALIZED" = "$EXPECTED_REPO" ]; then
            BINDING_OK=true
            echo "Binding verified: $BOUND_NORMALIZED == $EXPECTED_REPO"
            break
          else
            echo "ERROR: binding mismatch â€” bound to ${BOUND_NORMALIZED}, expected ${EXPECTED_REPO}" >&2
            echo "Cancel guidance: curl -X DELETE https://archon.bluedevilcollectibles.com/api/workflows/runs/${RUN_ID}" >&2
            echo "BINDING_OK=false"
            echo "BOUND_REPO=${BOUND_NORMALIZED}"
            echo "EXPECTED_REPO=${EXPECTED_REPO}"
            echo "RUN_ID=${RUN_ID}"
            exit 1
          fi
        fi

        echo "Polling... attempt $i/18 (5s)"
        sleep 5
      done

      if [ "$BINDING_OK" = "false" ]; then
        echo "ERROR: run not found in /api/workflows/runs after 90s (RUN_ID=${RUN_ID} WO_ID=${WO_ID})" >&2
        echo "Possible causes: API endpoint mismatch, run not started, codebase not selected." >&2
        exit 1
      fi

      echo "BINDING_OK=true"
      echo "BOUND_REPO=${BOUND_REPO}"
      echo "EXPECTED_REPO=${EXPECTED_REPO}"
      echo "RUN_ID=${RUN_ID}"
      echo "WO_ID=${WO_ID}"

  # Node 11: build-manifest
  # Builds v2 Captain CI manifest for WO-CAULDRON-ONRAMP-ATOM-01.
  # trigger_rule: all_done so skipped/failed optional nodes do not block manifest.
  - id: build-manifest
    agent: major-build
    trigger_rule: all_done
    depends_on: [verify-binding]
    prompt: |
      Build the Captain CI v2 completion manifest for WO-CAULDRON-ONRAMP-ATOM-01
      (the on-ramp's own Work Order â€” NOT the child product WO).

      ## Inputs
      Normalize-spec: $normalize-spec.output
      yaml-author: $yaml-author.output
      assert-yaml-ready: $assert-yaml-ready.output
      Adversarial-review: $adversarial-review.output
      Prefire-plan: $prefire-plan.output
      Approval-gate: $approval-gate.output
      Register-yaml: $register-yaml.output
      Fire-child: $fire-child.output
      Verify-binding: $verify-binding.output

      ## Required v2 Manifest Format

      ```
      WO: WO-CAULDRON-ONRAMP-ATOM-01
      Builder: Major Build (bdc-harness-wo-onramp)
      Files modified: (none â€” on-ramp is orchestration only)
      Files created: .archon/workflows/defaults/<WO_SLUG>.yaml (bdc-harness repo)
      Tests: N/A â€” adversarial-review 8-criteria gate IS the test (scores surfaced below)
      PRs: (register-yaml commits directly to bdc-harness dev; no PR for YAML registration)
      Merge ancestors: (bdc-harness dev HEAD after register-yaml PUT; child product WO PR TBD by child run)
      Grep assertions:
        bdc-harness: gh api repos/bluedevilcollectibles/bdc-harness/contents/.archon/workflows/defaults/<WO_SLUG>.yaml?ref=dev --jq .size â†’ > 0
        bdc-harness: grep -c "^model:[ ]sonnet$" .archon/workflows/defaults/<WO_SLUG>.yaml â†’ 1
        bdc-harness: grep -c "^policyFile:" .archon/workflows/defaults/<WO_SLUG>.yaml â†’ 1
        bdc-harness: grep -c "id: business-risk-gate" .archon/workflows/defaults/<WO_SLUG>.yaml â†’ 1
        bdc-harness: grep -c "id: flip-notion" .archon/workflows/defaults/<WO_SLUG>.yaml â†’ 1
      Runtime verification:
        Archon API: curl -s https://archon.bluedevilcollectibles.com/api/workflows | python3 -c "import sys,json; ws=[w for w in json.load(sys.stdin).get('workflows',[]) if (w.get('workflow',w)).get('name')=='<WO_SLUG>']; print('FOUND' if ws else 'MISSING')" â†’ FOUND
        Fire: RUN_ID=<from fire-child> BINDING_OK=<from verify-binding> BOUND_REPO=<from verify-binding>
      Vercel deployment: N/A (no Vercel-deployed repo touched)
      Adversarial review scores:
      <paste full SCORES block from adversarial-review>
      ADV_PASS=<from adversarial-review>
      VALIDATION: PASS
      ```

      Substitute all <placeholders> with real values from the node outputs above.
      If BINDING_OK=false or REGISTERED_OK != true, change VALIDATION to BLOCKED with reason.

  # Node 12: flip-notion
  # Flips WO-CAULDRON-ONRAMP-ATOM-01 (this on-ramp's own WO) to REVIEW.
  # Does NOT flip the child product WO (child run's flip-notion handles that).
  - id: flip-notion
    agent: xo
    depends_on: [build-manifest]
    when: "BINDING_OK=true"
    prompt: |
